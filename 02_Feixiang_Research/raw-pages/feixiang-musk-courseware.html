        &lt;button class=&quot;btn btn-primary&quot; onclick=&quot;runStroke(2)&quot;&gt;3. 做功冲程&lt;/button&gt;

      &lt;/div&gt;

  &lt;script&gt;
    var currentStroke = -1;
    var strokes = [
      { name: '吸气冲程', piston: 10, valveIn: 30, valveOut: 0, color: 'rgba(59, 130, 246, 0.2)', desc: '进气门打开，排气门关闭。活塞向下运动，吸入汽油和空气的混合物。' },
      { name: '压缩冲程', piston: 200, valveIn: 0, valveOut: 0, color: 'rgba(59, 130, 246, 0.4)', desc: '进气门和排气门都关闭。活塞向上运动，机械能转化为内能。' },
      { name: '做功冲程', piston: 10, valveIn: 0, valveOut: 0, color: 'rgba(239, 68, 68, 0.6)', desc: '火花塞点火。产生高温高压燃气推动活塞向下，内能转化为机械能。' },
      { name: '排气冲程', piston: 200, valveIn: 0, valveOut: 30, color: 'rgba(148, 163, 184, 0.2)', desc: '进气门关闭，排气门打开。活塞向上运动，排出废气。' }
    ];

    function runStroke(index) {
      currentStroke = index;
      const s = strokes[index];
      const piston = document.getElementById('piston-obj');
      const vin = document.getElementById('valve-in');
      const vout = document.getElementById('valve-out');
      const mix = document.getElementById('cylinder-mix');
      const label = document.getElementById('current-stroke-label');
      const desc = document.getElementById('stroke-desc');

      label.innerText = s.name;
      desc.innerHTML = s.desc;

      anime({
        targets: piston,
        bottom: s.piston,
        duration: 800,
        easing: 'easeInOutQuad',
        update: function() {
          mix.style.height = (300 - (parseInt(piston.style.bottom) + 80)) + 'px';
        }
      });
      anime({ targets: vin, rotate: s.valveIn, duration: 300 });
      anime({ targets: vout, rotate: -s.valveOut, duration: 300 });
      mix.style.backgroundColor = s.color;

      if (index === 2) { // 做功冲程点火效果
        const spark = document.getElementById('spark-plug');
        anime({
          targets: spark,
          backgroundColor: ['#f59e0b', '#ef4444', '#f59e0b'],
          scale: [1, 1.5, 1],
          duration: 300,
          loop: 2
        });
      }
      saveState();
    }

    function saveState() {
      window.parent.postMessage({ type: 'saveState', state: { currentStroke } }, '*');
    }

    window.addEventListener('message', function(e) {
      if (e.data &amp;&amp; e.data.type === 'restoreState' &amp;&amp; e.data.state) {
        if (e.data.state.currentStroke !== -1) runStroke(e.data.state.currentStroke);
      }
    });
  &lt;/script&gt;

        &lt;p&gt;\(m = 2\ \text{kg}\), \(t_0 = 20℃\), \(t = 70℃\), \(c = 4.2 \times 10^3\ \text{J}/(\text{kg}\cdot℃)\)&lt;/p&gt;

      &lt;div id=&quot;step-2&quot; class=&quot;card&quot; style=&quot;display:none; background: #f8fafc;&quot;&gt;
        &lt;p&gt;&lt;strong&gt;第二步：计算温度变化量 $\Delta t$&lt;/strong&gt;&lt;/p&gt;

      &lt;/div&gt;
      &lt;div id=&quot;step-3&quot; class=&quot;card&quot; style=&quot;display:none; background: #f8fafc;&quot;&gt;

        &lt;p&gt;\(Q_{\text{吸}} = cm\Delta t = 4.2 \times 10^3\ \text{J}/(\text{kg}\cdot℃) \times 2\ \text{kg} \times 50℃ = 4.2 \times 10^5\ \text{J}\)&lt;/p&gt;

  &lt;script&gt;
    var placedItems = [];
    var isDragging = false;
    
    // 简化版：仅演示拖拽布局及逻辑反馈，不包含复杂的实时SVG拓扑
    const canvas = document.getElementById('circuit-canvas');
    
    canvas.addEventListener('dragover', (e) =&gt; e.preventDefault());
    canvas.addEventListener('drop', (e) =&gt; {
      const type = e.dataTransfer.getData('text/plain');
      const rect = canvas.getBoundingClientRect();
      const x = e.clientX - rect.left - 50;
      const y = e.clientY - rect.top - 25;
      
      createPlacedItem(type, x, y);
    });

    document.querySelectorAll('.drag-item').forEach(item =&gt; {
      item.addEventListener('dragstart', (e) =&gt; {
        e.dataTransfer.setData('text/plain', item.innerText);
        item.classList.add('dragging');
      });
      item.addEventListener('dragend', () =&gt; item.classList.remove('dragging'));
    });

    function createPlacedItem(text, x, y) {
      const el = document.createElement('div');
      el.className = 'card';
      el.style.position = 'absolute';
      el.style.left = x + 'px';
      el.style.top = y + 'px';
      el.style.margin = '0';
      el.style.cursor = 'move';
      el.innerText = text;
      el.setAttribute('data-interactive', '');
      canvas.appendChild(el);
      placedItems.push(text);
      saveState();
    }

    function testCircuit() {
      const fb = document.getElementById('circuit-feedback');
      fb.style.display = 'block';
      const hasBattery = placedItems.some(i =&gt; i.includes('电池'));
      const hasBulb = placedItems.some(i =&gt; i.includes('灯泡'));
      const hasSwitch = placedItems.some(i =&gt; i.includes('开关'));
      
      if (hasBattery &amp;&amp; hasBulb &amp;&amp; hasSwitch) {
        fb.innerHTML = '&lt;span style=&quot;color:#10b981&quot;&gt;✅ &lt;strong&gt;通路成功！&lt;/strong&gt;灯泡已点亮。这是一个标准的串联/并联复习模型。&lt;/span&gt;';
        anime({ targets: fb, scale: [0.9, 1], duration: 300 });
      } else {
        fb.innerHTML = '&lt;span style=&quot;color:#ef4444&quot;&gt;❌ &lt;strong&gt;电路不完整。&lt;/strong&gt; 请确保包含电源、开关和至少一个用电器。&lt;/span&gt;';
      }
    }

    function resetCircuit() {
      canvas.querySelectorAll('.card').forEach(el =&gt; el.remove());
      placedItems = [];
      document.getElementById('circuit-feedback').style.display = 'none';
      saveState();
    }

    function saveState() {
      window.parent.postMessage({ type: 'saveState', state: { items: placedItems } }, '*');
    }

    window.addEventListener('message', function(e) {
      if (e.data &amp;&amp; e.data.type === 'restoreState' &amp;&amp; e.data.state) {
        // 恢复逻辑简化处理：重置并按记录重建（略）
      }
    });
  &lt;/script&gt;

&lt;template class=&quot;page-data&quot; data-id=&quot;13&quot; data-name=&quot;欧姆定律&quot;&gt;
  &lt;div class=&quot;page-container&quot;&gt;
    &lt;div class=&quot;page-title&quot;&gt;欧姆定律：揭示 $I, U, R$ 的关系&lt;/div&gt;
    &lt;div class=&quot;card&quot; style=&quot;background: linear-gradient(to right, #eff6ff, #ffffff);&quot;&gt;
      &lt;h4 style=&quot;color:var(--primary)&quot;&gt;1. 内容与表达式&lt;/h4&gt;

      &lt;div style=&quot;text-align: center; margin: 15px 0;&quot;&gt;
        &lt;span style=&quot;font-size: 32px; font-weight: 700; color: #ef4444;&quot;&gt;\[I = \frac{U}{R}\]&lt;/span&gt;
      &lt;/div&gt;
    &lt;/div&gt;
    &lt;div style=&quot;display: grid; grid-template-columns: 1fr 1fr; gap: 20px; margin-top: 10px;&quot;&gt;
      &lt;div class=&quot;card&quot; style=&quot;border-top: 4px solid #10b981;&quot;&gt;
        &lt;h4 style=&quot;color:#10b981&quot;&gt;2. 公式变形&lt;/h4&gt;
        &lt;p&gt;求电压：\(U = IR\)&lt;/p&gt;
        &lt;p&gt;求电阻：\(R = \frac{U}{I}\) (伏安法测电阻原理)&lt;/p&gt;
      &lt;/div&gt;
      &lt;div class=&quot;card&quot; style=&quot;border-top: 4px solid #f59e0b;&quot;&gt;
        &lt;h4 style=&quot;color:#f59e0b&quot;&gt;3. 注意事项&lt;/h4&gt;
        &lt;ul style=&quot;font-size: 14px; line-height: 1.6;&quot;&gt;
          &lt;li&gt;&lt;strong&gt;同体性：&lt;/strong&gt;\(I, U, R\) 必须对应同一段导体。&lt;/li&gt;
          &lt;li&gt;&lt;strong&gt;同时性：&lt;/strong&gt;\(I, U, R\) 必须对应同一个时刻。&lt;/li&gt;
          &lt;li&gt;&lt;strong&gt;统一性：&lt;/strong&gt;单位必须统一为 \(\text{A, V, &Omega;}\)。&lt;/li&gt;
        &lt;/ul&gt;
      &lt;/div&gt;
    &lt;/div&gt;
  &lt;/div&gt;
&lt;/template&gt;

    &lt;/div&gt;
    
    &lt;!-- 待分类项 --&gt;
    &lt;div id=&quot;source-zone&quot; style=&quot;display: flex; gap: 15px; justify-content: center; flex-wrap: wrap;&quot;&gt;
      &lt;div class=&quot;card drag-item&quot; draggable=&quot;true&quot; data-type=&quot;series&quot; data-interactive style=&quot;cursor: grab; margin:0; padding: 10px 20px; background: white;&quot;&gt;逐个顺次连接&lt;/div&gt;

    &lt;div id=&quot;classify-feedback&quot; style=&quot;position: fixed; bottom: 30px; left: 50%; transform: translateX(-50%); padding: 10px 30px; border-radius: 50px; display: none; font-weight: bold; z-index: 100;&quot;&gt;&lt;/div&gt;

  &lt;/style&gt;
  &lt;script&gt;
    var correctCount = 0;
    const totalItems = 5;

    document.querySelectorAll('.drag-item').forEach(item =&gt; {
      item.addEventListener('dragstart', (e) =&gt; {
        e.dataTransfer.setData('text/plain', item.innerText);
        e.dataTransfer.setData('type', item.dataset.type);
        item.classList.add('dragging');
      });
      item.addEventListener('dragend', () =&gt; item.classList.remove('dragging'));
    });

    document.querySelectorAll('.drop-zone').forEach(zone =&gt; {
      zone.addEventListener('dragover', (e) =&gt; {
        e.preventDefault();
        zone.classList.add('over');
      });
      zone.addEventListener('dragleave', () =&gt; zone.classList.remove('over'));
      zone.addEventListener('drop', (e) =&gt; {
        e.preventDefault();
        zone.classList.remove('over');
        const type = e.dataTransfer.getData('type');
        const text = e.dataTransfer.getData('text/plain');
        const zoneType = zone.id.replace('zone-', '');
        
        handleDrop(text, type, zoneType, zone);
      });
    });

    function handleDrop(text, type, zoneType, zone) {
      const feedback = document.getElementById('classify-feedback');
      feedback.style.display = 'block';
      
      if (type === zoneType) {
        // 找到对应的原始DOM元素并移动它
        const original = Array.from(document.querySelectorAll('.drag-item')).find(i =&gt; i.innerText === text);
        if (original) {
          original.setAttribute('draggable', 'false');
          original.style.cursor = 'default';
          original.style.opacity = '1';
          original.style.border = '1px solid #10b981';
          zone.querySelector('.items-container').appendChild(original);
          correctCount++;
        }
        feedback.innerText = '✨ 太棒了！归类正确';
        feedback.style.backgroundColor = '#dcfce7';
        feedback.style.color = '#166534';
      } else {
        feedback.innerText = '❌ 还没对哦，再想想各电路的特征';
        feedback.style.backgroundColor = '#fef2f2';
        feedback.style.color = '#991b1b';
      }
      
      anime({ targets: feedback, scale: [0.8, 1], opacity: [0, 1], duration: 400 });
      setTimeout(() =&gt; { anime({ targets: feedback, opacity: 0, duration: 400 }); }, 2000);

      if (correctCount === totalItems) {
        setTimeout(() =&gt; {
          alert('恭喜你完成了所有分类！你已经完美掌握了串并联电路的特征。');

      }
      saveState();
    }

    function saveState() {
      // 简化版状态保存：记录已正确归类的项
      window.parent.postMessage({ type: 'saveState', state: { correctCount } }, '*');

&lt;template class=&quot;page-data&quot; data-id=&quot;15&quot; data-name=&quot;电学计算练习&quot;&gt;
  &lt;div class=&quot;page-container&quot;&gt;
    &lt;div class=&quot;page-title&quot;&gt;欧姆定律计算练习&lt;/div&gt;
    &lt;div class=&quot;card&quot;&gt;
      &lt;p style=&quot;font-size: 18px;&quot;&gt;&lt;strong&gt;[练习]&lt;/strong&gt; 如图所示，电阻 \(R_1 = 10\ &Omega;\)，电源电压 \(U = 6\ \text{V}\)。当开关闭合时，求通过电阻 \(R_1\) 的电流 \(I\) 是多少？&lt;/p&gt;
    &lt;/div&gt;
    &lt;div style=&quot;display: flex; gap: 20px;&quot;&gt;
      &lt;div style=&quot;flex: 1;&quot;&gt;
        &lt;div style=&quot;background: #f1f5f9; height: 180px; border-radius: 8px; display: flex; align-items: center; justify-content: center; border: 1px solid #e2e8f0;&quot;&gt;
          &lt;div style=&quot;width: 150px; height: 100px; border: 2px solid #475569; position: relative;&quot;&gt;
            &lt;div style=&quot;position: absolute; top: -12px; left: 50%; transform: translateX(-50%); background: white; padding: 0 5px;&quot;&gt;\(R_1=10\ &Omega;\)&lt;/div&gt;
            &lt;div style=&quot;position: absolute; bottom: -12px; left: 50%; transform: translateX(-50%); background: white; padding: 0 5px;&quot;&gt;\(U=6\ \text{V}\)&lt;/div&gt;
          &lt;/div&gt;
        &lt;/div&gt;
      &lt;/div&gt;
      &lt;div style=&quot;flex: 1; display: flex; flex-direction: column; gap: 10px;&quot;&gt;
        &lt;div class=&quot;card&quot; id=&quot;ans-15&quot; style=&quot;display:none; background: #f0fdf4; border-left: 5px solid #22c55e;&quot;&gt;
          &lt;h4 style=&quot;color:#166534&quot;&gt;解析过程：&lt;/h4&gt;
          &lt;p&gt;根据欧姆定律 \(I = \frac{U}{R}\)&lt;/p&gt;
          &lt;p&gt;代入数据：\(I = \frac{6\ \text{V}}{10\ &Omega;} = 0.6\ \text{A}\)&lt;/p&gt;
          &lt;p&gt;&lt;strong&gt;答：&lt;/strong&gt;通过电阻的电流为 $0.6\ \text{A}$。&lt;/p&gt;
        &lt;/div&gt;
        &lt;button class=&quot;btn btn-primary&quot; onclick=&quot;document.getElementById('ans-15').style.display='block'; anime({targets:'#ans-15', opacity:[0,1], translateY:[10,0]})&quot;&gt;核对答案&lt;/button&gt;
      &lt;/div&gt;
    &lt;/div&gt;
  &lt;/div&gt;
&lt;/template&gt;

&lt;template class=&quot;page-data&quot; data-id=&quot;16&quot; data-name=&quot;综合练习&quot;&gt;

    &lt;div class=&quot;card&quot; style=&quot;margin-top: 15px;&quot;&gt;
      &lt;p&gt;&lt;strong&gt;2. 串联电路中，若其中一个小灯泡断路，则另一个小灯泡：&lt;/strong&gt;&lt;/p&gt;

&lt;template class=&quot;page-data&quot; data-id=&quot;17&quot; data-name=&quot;易错辨析&quot;&gt;
  &lt;div class=&quot;page-container&quot;&gt;
    &lt;div class=&quot;page-title&quot;&gt;考前易错点红灯区&lt;/div&gt;
    &lt;div style=&quot;display: grid; grid-template-columns: 1fr 1fr; gap: 20px;&quot;&gt;
      &lt;div class=&quot;card&quot; style=&quot;background: #fff1f2;&quot;&gt;
        &lt;h4 style=&quot;color:#be123c&quot;&gt;❌ 典型错解&lt;/h4&gt;
        &lt;p&gt;1. 只要温度不变，内能就不变。&lt;/p&gt;
        &lt;p&gt;2. 相互吸引的物体一定带异种电荷。&lt;/p&gt;
        &lt;p&gt;3. 导体电阻与电压成正比，与电流成反比。&lt;/p&gt;
      &lt;/div&gt;
      &lt;div class=&quot;card&quot; style=&quot;background: #f0fdf4;&quot;&gt;
        &lt;h4 style=&quot;color:#15803d&quot;&gt;✅ 正确认知&lt;/h4&gt;
        &lt;p&gt;1. 晶体熔化过程吸热，温度不变，但&lt;strong&gt;内能增加&lt;/strong&gt;。&lt;/p&gt;
        &lt;p&gt;2. &lt;strong&gt;带电体能吸引轻小物体&lt;/strong&gt;，异种电荷也互相吸引。&lt;/p&gt;
        &lt;p&gt;3. 电阻是导体的&lt;strong&gt;属性&lt;/strong&gt;，由材料/长度等决定，与 $U, I$ 无关。&lt;/p&gt;
      &lt;/div&gt;
    &lt;/div&gt;
  &lt;/div&gt;
&lt;/template&gt;

    (function () {
        let startTime = null
        let totalTime = 0
        let reportTimer = null // 防抖定时器

        // 开始计时
        function startTimer() {
            if (!startTime) {
                startTime = Date.now()
                console.log('[埋点] 开始计时')
            }
        }

        // 停止计时并累加时长
        function stopTimer() {
            if (startTime) {
                totalTime += Date.now() - startTime
                startTime = null
                console.log('[埋点] 停止计时，累计时长:', Math.floor(totalTime / 1000), '秒')
            }
        }

        // 检查页面是否真正可见
        function isPageVisible() {
            // 检查 document.hidden
            if (document.hidden) {
                return false
            }

            // 检查 document.visibilityState
            if (document.visibilityState && document.visibilityState !== 'visible') {
                return false
            }

            // 检查窗口是否有焦点
            if (!document.hasFocus()) {
                return false
            }

            return true
        }

        // 上报停留时长（带防抖）
        function reportStayTime(eventType, immediate = false) {
            stopTimer()

            // 清除之前的定时器
            if (reportTimer) {
                clearTimeout(reportTimer)
                reportTimer = null
            }

            // 如果是立即上报（如页面卸载），不使用防抖
            if (immediate) {
                doReport(eventType)
                return
            }

            // 使用防抖，避免短时间内多次上报
            // 100ms 内如果有多个事件触发，只上报最后一次
            reportTimer = setTimeout(function () {
                doReport(eventType)
                reportTimer = null
            }, 100)
        }

        // 实际执行上报
        function doReport(eventType) {
            if (window.frog && totalTime > 0) {
                const serverData = window.__SERVER_DATA__ || {}
                const chatId = serverData.watermarkChatId
                window.frog.add({
                    url: '/time/HtmlPage/enter',
                    eventId: 42818,
                    customExtend: {
                        chat_id: chatId,
                        use_time: Math.floor(totalTime / 1000), // 转换为秒
                    },
                    duration: Math.floor(totalTime / 1000), // 转换为秒,
                    currentPage: 'HtmlPage',
                    eventAction: 'time',
                    eventName: 'enter'
                })
                console.log(`[埋点] 页面停留时长上报 (${eventType}):`, Math.floor(totalTime / 1000), '秒')

                // 上报后重置累计时长，为下次统计做准备
                totalTime = 0
            }
        }

        // 清理函数：移除所有事件监听器
        function cleanup() {
            console.log('[埋点] 清理计时器资源')

            // 清除防抖定时器
            if (reportTimer) {
                clearTimeout(reportTimer)
                reportTimer = null
            }

            // 移除事件监听器
            document.removeEventListener('visibilitychange', handleVisibilityChange)
            window.removeEventListener('blur', handleBlur)
            window.removeEventListener('focus', handleFocus)
            window.removeEventListener('beforeunload', handleBeforeUnload)
            window.removeEventListener('pagehide', handlePageHide)

            // 重置变量
            startTime = null
            totalTime = 0
        }

        // 事件处理函数（需要命名以便移除）
        function handleVisibilityChange() {
            if (document.hidden) {
                // 页面不可见，停止计时并上报
                console.log('[埋点] visibilitychange - 页面隐藏')
                reportStayTime('visibilitychange')
            } else {
                // 页面可见，开始新的计时
                console.log('[埋点] visibilitychange - 页面显示，开始新的计时')
                startTimer()
            }
        }

        function handleBlur() {
            // 窗口失去焦点，停止计时并上报
            console.log('[埋点] blur - 窗口失去焦点')
            reportStayTime('blur')
        }

        function handleFocus() {
            // 窗口获得焦点，开始新的计时
            console.log('[埋点] focus - 窗口获得焦点，开始新的计时')
            startTimer()
        }

        function handleBeforeUnload() {
            // 页面卸载前立即上报（不使用防抖）
            console.log('[埋点] beforeunload - 页面即将卸载')
            reportStayTime('beforeunload', true)
            cleanup()
        }

        function handlePageHide() {
            // 页面隐藏时立即上报（iOS Safari 更可靠，不使用防抖）
            console.log('[埋点] pagehide - 页面隐藏')
            reportStayTime('pagehide', true)
        }

        function handleDOMContentLoaded() {
            if (isPageVisible()) {
                startTimer()
            }
        }

        // 监听页面可见性变化
        document.addEventListener('visibilitychange', handleVisibilityChange)

        // 监听窗口失去/获得焦点
        window.addEventListener('blur', handleBlur)
        window.addEventListener('focus', handleFocus)

        // 页面加载完成后开始计时
        if (document.readyState === 'loading') {
            window.addEventListener('DOMContentLoaded', handleDOMContentLoaded)
        } else {
            if (isPageVisible()) {
                startTimer()
            }
        }

        // 页面卸载时上报
        window.addEventListener('beforeunload', handleBeforeUnload)

        // 兼容性：监听 pagehide 事件（iOS Safari 更可靠）
        window.addEventListener('pagehide', handlePageHide)
    })()

    /**
     * 点击飞象老师 Logo 的埋点
     */
    function trackLogoClick(event) {
        // 阻止事件冒泡，避免触发 HTML 点击埋点
        event.stopPropagation()

        if (window.frog) {
            const serverData = window.__SERVER_DATA__ || {}
            const chatId = serverData.watermarkChatId
            console.log('trackHtmlClick', chatId)

            window.frog.add({
                url: '/click/HtmlPage/logo',
                eventId: 42816,
                customExtend: {
                    chat_id: chatId,
                },
                currentPage: 'HtmlPage',
                eventAction: 'click',
                eventName: 'logo'
            })

            console.log('[埋点] 点击飞象老师 Logo')
        }
    }

    /**
     * 点击立即体验的埋点
     */
    function trackStartButtonClick(event) {
        // 阻止事件冒泡，避免触发 HTML 点击埋点
        event.stopPropagation()

        if (window.frog) {
            const serverData = window.__SERVER_DATA__ || {}
            const chatId = serverData.watermarkChatId
            console.log('trackHtmlClick', chatId)
            window.frog.add({
                url: '/click/HtmlPage/start',
                eventId: 42817,
                customExtend: {
                    chat_id: chatId
                },
                currentPage: 'HtmlPage',
                eventAction: 'click',
                eventName: 'start'
            })
            console.log('[埋点] 点击立即体验')
        }
    }

    // 绑定点击事件
    document.addEventListener('DOMContentLoaded', function () {
        // 绑定 Logo 点击埋点和跳转功能
        const logoElement = document.querySelector('.left-watermark-content')
        if (logoElement) {
            logoElement.addEventListener('click', function (event) {
                trackLogoClick(event)
                openFeixiangTeacher(event)
            })
        }

        // 绑定立即体验按钮点击埋点和跳转功能
        const startButton = document.querySelector('.jump-button')
        if (startButton) {
            startButton.addEventListener('click', function (event) {
                trackStartButtonClick(event)
                openFeixiangTeacher(event)
            })
        }

        // 绑定水印覆盖层点击（整体区域）
        const watermarkOverlay = document.querySelector('.watermark-overlay')
        if (watermarkOverlay) {
            watermarkOverlay.addEventListener('click', function (event) {
                // 如果点击的不是 logo 或按钮，则触发跳转
                const target = event.target
                const isLogo = target.closest('.left-watermark-content')
                const isButton = target.closest('.jump-button')

                if (!isLogo && !isButton) {
                    openFeixiangTeacher(event)
                }
            })
        }
    })

    // ==================== 原有功能代码 ====================

    function adjustRem() {
        const pcBaseWidth = 375 // 设计稿
        const width = document.documentElement.clientWidth
        document.documentElement.style.fontSize = `${(width / pcBaseWidth * 100).toFixed(2)}px`
    }


    // 移动端检测和按钮隐藏逻辑
    function checkAndHideButtonOnMobile() {
        const isMobile = getIsMobile()
        if (isMobile) {
            adjustRem()
        }
        const jumpButton = document.querySelector('.right-watermark-content .jump-button');
        const iframeContainer = document.querySelector('.iframe-container');

        if (isMobile && jumpButton) {
            jumpButton.style.display = 'none';
        } else {
            jumpButton.style.display = 'flex'
        }

        // 移动端时给iframe-container添加类名，否则移除类名
        if (iframeContainer) {
            if (isMobile) {
                iframeContainer.classList.add('mobile');
            } else {
                iframeContainer.classList.remove('mobile');
            }
        }
    }


    function handleResize() {
        // 响应式处理：重新检测移动端并处理按钮显示/隐藏
        checkAndHideButtonOnMobile();

        // 在窗口大小变化时，重新应用移动端相关的逻辑
        const isMobile = getIsMobile()
        const watermarkOverlay = document.querySelector('.watermark-overlay');
        const iframeContainer = document.querySelector('.iframe-container');

        // 根据当前设备类型调整水印覆盖层的点击行为
        if (watermarkOverlay) {
            if (isMobile) {
                // 移动端：移除点击事件或设置为空函数
                watermarkOverlay.onclick = function () {
                    // 移动端不执行跳转
                    return;
                };
            } else {
                // 桌面端：恢复正常的点击跳转功能
                watermarkOverlay.onclick = openFeixiangTeacher;
            }
        }

        // 确保在resize时也能正确添加或移除mobile类
        if (iframeContainer) {
            if (isMobile) {
                iframeContainer.classList.add('mobile');
            } else {
                iframeContainer.classList.remove('mobile');
            }
        }
    }

    // 防止iframe内容溢出
    window.addEventListener('resize', handleResize);

    // 页面加载完成后执行移动端检测
    document.addEventListener('DOMContentLoaded', checkAndHideButtonOnMobile);

    // 清理所有事件绑定的函数
    function clearAllEvents() {
        // 清除 resize 事件监听器
        window.removeEventListener('resize', handleResize);

        // 清除 DOMContentLoaded 事件监听器
        document.removeEventListener('DOMContentLoaded', checkAndHideButtonOnMobile);
    }

    // 页面卸载时自动清理事件（可选）
    window.addEventListener('beforeunload', clearAllEvents);

</script>
