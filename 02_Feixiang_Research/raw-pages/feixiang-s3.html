  &lt;script&gt;
    // 壳框架翻页拦截白名单：
    //   a, button, input, select, textarea, [onclick], [role=&quot;button&quot;], [contenteditable]
    // &rarr; 命中以上选择器的元素点击时不翻页。
    //
    // 正确做法：给需要拦截的元素加 role=&quot;button&quot; 属性。
    //   - 不要用 onclick=&quot;&quot; （会覆盖页面 JS 的 el.onclick = fn 绑定）
    //   - 不要用 data-interactive（壳框架不识别）
    //   - canvas 也需手动标记，否则点击会被视为空白
    (function () {
      var SELECTOR = [
        'canvas', 'video', 'audio',
        '[draggable=&quot;true&quot;]',
        '.tool-btn', '.drag-item', '.drop-zone',
        '.click-area', '.click-overlay', '.option-btn', '.action-btn',
        '.step-item', '.nav-icon', '.close-btn', '.close-review', '.close-area',
        '.next-btn', '.prev-btn', '.back-area', '.error-btn', '.start-trigger',
        '.next-step', '.prev-step', '.input-box',
        '.whiteboard-container', '#drawing-canvas',
        '.slide-content', '.feedback-overlay', '.feedback-card',
        '.review-overlay', '.review-card', '.btn-overlay'
      ].join(',');

      function markOne(el) {
        if (el &amp;&amp; el.nodeType === 1 &amp;&amp; !el.hasAttribute('role')) {
          el.setAttribute('role', 'button');
        }
      }
      function markAll(root) {
        try {
          (root.querySelectorAll ? root.querySelectorAll(SELECTOR) : []).forEach(markOne);
          if (root.matches &amp;&amp; root.matches(SELECTOR)) markOne(root);
        } catch (e) {}
      }
      function boot() {
        markAll(document);
        try {
          var mo = new MutationObserver(function (muts) {
            muts.forEach(function (m) {
              m.addedNodes &amp;&amp; m.addedNodes.forEach(function (n) {
                if (n.nodeType === 1) markAll(n);
              });
            });
          });
          mo.observe(document.documentElement, { childList: true, subtree: true });
        } catch (e) {}
      }
      if (document.readyState === 'loading') {
        document.addEventListener('DOMContentLoaded', boot);
      } else {
        boot();
      }
    })();
  &lt;/script&gt;

    &lt;script&gt;
        // 配置参数
        const CONFIG = {
            primaryColor: 0x02543B,   // 深绿色
            secondaryColor: 0x7BA183, // 浅绿色
            bgColor: 0xE3EDE3,        // 浅绿色背景
            cylinderColor1: 0x02543B, // 圆柱颜色 1 (深绿)
            cylinderColor2: 0x7BA183  // 圆柱颜色 2 (浅绿)
        };

        // 状态管理
        const state = { r: 2.52, h: 10, slices: 16, step: 0, objects: [], wholeCylinder: null }; // r = sqrt(20/pi) &asymp; 2.52
        let scene, camera, renderer, controls, cylinderGroup, gridHelper;

        function init() {
            initThree();
            initUI();
            createCylinder();
            animate();
            window.addEventListener('resize', onResize);
        }

        function initThree() {
            const container = document.getElementById('three-canvas');
            scene = new THREE.Scene();
            scene.background = new THREE.Color(CONFIG.bgColor);

            camera = new THREE.PerspectiveCamera(45, container.clientWidth / container.clientHeight, 0.1, 1000);
            camera.position.set(20, 12, 20);
            camera.lookAt(0, 5, 0);

            renderer = new THREE.WebGLRenderer({ 
                antialias: true, 
                alpha: true, 
                precision: 'highp',
                powerPreference: 'high-performance'
            });
            renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2)); // 限制最大像素比，平衡性能与清晰度
            renderer.setSize(container.clientWidth, container.clientHeight);
            renderer.shadowMap.enabled = true;
            container.appendChild(renderer.domElement);

            controls = new THREE.OrbitControls(camera, renderer.domElement);
            controls.target.set(0, 5, 0);
            controls.enableDamping = true;
            controls.dampingFactor = 0.05;

            const ambientLight = new THREE.AmbientLight(0xffffff, 0.6);
            scene.add(ambientLight);
            const dirLight = new THREE.DirectionalLight(0xffffff, 0.8);
            dirLight.position.set(15, 30, 15);
            scene.add(dirLight);

            const dirLight2 = new THREE.DirectionalLight(0xffffff, 0.3);
            dirLight2.position.set(-15, 10, -15);
            scene.add(dirLight2);

            // 网格
            gridHelper = new THREE.GridHelper(30, 30, 0x01553D, 0x01553D);
            gridHelper.material.opacity = 0.1;
            gridHelper.material.transparent = true;
            scene.add(gridHelper);
        }

        function initUI() {
            document.getElementById('slider-r').addEventListener('input', (e) =&gt; {
                const s = parseFloat(e.target.value);
                state.r = Math.sqrt(s / Math.PI);
                document.getElementById('val-r').textContent = s + 'cm&sup2;';
                resetScene();
                createCylinder();
            });

            document.getElementById('slider-h').addEventListener('input', (e) =&gt; {
                state.h = parseFloat(e.target.value);
                document.getElementById('val-h').textContent = state.h + 'cm';
                controls.target.set(0, state.h / 2, 0);
                resetScene();
                createCylinder();
            });

            document.getElementById('slider-s').addEventListener('input', (e) =&gt; {
                state.slices = parseInt(e.target.value);
                document.getElementById('val-s').textContent = state.slices;
                resetScene();
                createCylinder();
            });

            document.getElementById('btn-cut').addEventListener('click', animateCut);
            document.getElementById('btn-arrange').addEventListener('click', animateArrange);
            document.getElementById('btn-merge').addEventListener('click', animateMerge);
            document.getElementById('btn-auto-vol').addEventListener('click', autoPlayVolume);
            document.getElementById('btn-reset').addEventListener('click', () =&gt; {
                resetScene();
                createCylinder();
            });
        }

        function resetScene() {
            if(cylinderGroup) scene.remove(cylinderGroup);
            state.step = 0;
            state.objects = [];
            updateLabels();
        }

        function createCylinder() {
            if(cylinderGroup) scene.remove(cylinderGroup);
            if(state.wholeCylinder) scene.remove(state.wholeCylinder);
            
            cylinderGroup = new THREE.Group();
            scene.add(cylinderGroup);
            state.objects = [];

            const { r, h, slices } = state;
            const angleStep = (Math.PI * 2) / slices;
            const color1 = new THREE.Color(CONFIG.cylinderColor1);
            const color2 = new THREE.Color(CONFIG.cylinderColor2);

            // 1. 创建初始状态的平滑圆柱体（高分段数 64，视觉上是真正的圆）
            // 使圆柱本体始终显示为圆滑，而不是 slices 边棱柱
            const wholeGeo = new THREE.CylinderGeometry(r, r, h, 64, 1, false);
            const wholeMat = new THREE.MeshPhongMaterial({
                color: color2,
                transparent: true,
                opacity: 0.7,
                side: THREE.DoubleSide,
                shininess: 100,
                specular: 0x444444
            });
            const wholeMesh = new THREE.Mesh(wholeGeo, wholeMat);
            wholeMesh.position.y = h / 2;
            
            // 圆柱顶底圆周轮廓线（平滑的圆）
            const smoothEdges = new THREE.EdgesGeometry(wholeGeo, 15);
            const smoothLine = new THREE.LineSegments(smoothEdges, new THREE.LineBasicMaterial({
                color: CONFIG.primaryColor,
                transparent: true,
                opacity: 0.8
            }));
            wholeMesh.add(smoothLine);

            // 2. 在圆柱内部表面添加&ldquo;切割预览线&rdquo;，数量 = slices
            // 这些是虚拟的垂直辅助线，提示用户切割的位置，不改变圆柱本身的圆滑外观
            const cutLinesGeo = new THREE.BufferGeometry();
            const cutPositions = [];
            const topRingPositions = [];
            const botRingPositions = [];
            for (let i = 0; i &lt; slices; i++) {
                const angle = i * angleStep;
                const x = Math.cos(angle) * r;
                const z = Math.sin(angle) * r;
                // 垂直切割线（从底到顶）
                cutPositions.push(x, -h / 2, z, x, h / 2, z);
                // 顶面和底面从中心往外的径向线（指示切成的扇形）
                topRingPositions.push(0, h / 2, 0, x, h / 2, z);
                botRingPositions.push(0, -h / 2, 0, x, -h / 2, z);
            }
            cutLinesGeo.setAttribute('position', new THREE.Float32BufferAttribute(cutPositions, 3));
            const cutLinesMat = new THREE.LineBasicMaterial({
                color: CONFIG.primaryColor,
                transparent: true,
                opacity: 0.35
            });
            const cutLines = new THREE.LineSegments(cutLinesGeo, cutLinesMat);
            wholeMesh.add(cutLines);

            // 顶底径向线
            const radialGeo = new THREE.BufferGeometry();
            radialGeo.setAttribute('position', new THREE.Float32BufferAttribute(
                topRingPositions.concat(botRingPositions), 3
            ));
            const radialLines = new THREE.LineSegments(radialGeo, new THREE.LineBasicMaterial({
                color: CONFIG.primaryColor,
                transparent: true,
                opacity: 0.25
            }));
            wholeMesh.add(radialLines);

            state.wholeCylinder = wholeMesh;
            scene.add(wholeMesh);

            // 3. 创建用于动画的切割块（初始隐藏）
            for (let i = 0; i &lt; slices; i++) {
                const shape = new THREE.Shape();
                shape.moveTo(0, 0);
                shape.arc(0, 0, r, -angleStep/2, angleStep/2, false);
                shape.lineTo(0, 0);

                const extrudeSettings = { steps: 1, depth: h, bevelEnabled: false };
                const geometry = new THREE.ExtrudeGeometry(shape, extrudeSettings);
                geometry.rotateX(-Math.PI / 2);

                const material = new THREE.MeshPhongMaterial({ 
                    color: color2,
                    side: THREE.DoubleSide,
                    shininess: 100,
                    specular: 0x444444,
                    transparent: true,
                    opacity: 0.7
                });
                
                const mesh = new THREE.Mesh(geometry, material);
                const edges = new THREE.EdgesGeometry(geometry);
                const line = new THREE.LineSegments(edges, new THREE.LineBasicMaterial({ color: CONFIG.primaryColor, transparent: true, opacity: 0.8 }));
                mesh.add(line);
                
                mesh.rotation.y = -i * angleStep;
                mesh.position.y = 0;
                mesh.userData = { index: i, initialAngle: -i * angleStep };

                cylinderGroup.add(mesh);
                state.objects.push(mesh);
                mesh.visible = false;
            }
            
            if (state.step &gt; 0) {
                state.wholeCylinder.visible = false;
                state.objects.forEach(m =&gt; m.visible = true);
            }

            updateLabels();
        }

        function animateCut() {
            if (state.step &gt;= 1) return;
            state.step = 1;
            
            // 切换显示状态：隐藏完整圆柱，显示切割块
            if (state.wholeCylinder) state.wholeCylinder.visible = false;
            state.objects.forEach(mesh =&gt; mesh.visible = true);

            const color1 = new THREE.Color(CONFIG.cylinderColor1);
            state.objects.forEach((mesh, i) =&gt; {
                const angle = mesh.userData.initialAngle;
                const dist = 1.0;
                
                if (i &lt; state.slices / 2) {
                    gsap.to(mesh.material.color, { r: color1.r, g: color1.g, b: color1.b, duration: 1.2 });
                }
                
                gsap.to(mesh.position, { x: Math.cos(angle) * dist, z: -Math.sin(angle) * dist, duration: 1.2, ease: &quot;power2.out&quot; });
            });
        }

        function animateArrange() {
            if (state.step &lt; 1) { animateCut(); setTimeout(animateArrange, 1300); return; }
            if (state.step &gt;= 1.5) return;
            state.step = 1.5;
            const { r, slices } = state;
            const angleStep = (Math.PI * 2) / slices;
            const half = slices / 2;
            const chordLen = 2 * r * Math.sin(angleStep / 2);
            const totalLen = (half * chordLen);
            
            state.objects.forEach((mesh, i) =&gt; {
                const isFirstHalf = i &lt; half;
                const localIdx = isFirstHalf ? i : (i - half);
                const finalIdx = isFirstHalf ? (half - 1 - localIdx) : localIdx;
                
                let targetX = isFirstHalf ? 
                    (finalIdx * chordLen) - (totalLen / 2) + (chordLen / 2) : 
                    (finalIdx * chordLen) - (totalLen / 2) + chordLen;
                
                let targetRotY = isFirstHalf ? -Math.PI/2 : Math.PI/2;
                const tempZ = isFirstHalf ? 2 : -2;
                
                gsap.to(mesh.position, { x: targetX, z: tempZ, y: 0, duration: 2.0, ease: &quot;power2.inOut&quot; });
                gsap.to(mesh.rotation, { y: targetRotY, duration: 2.0, ease: &quot;power2.inOut&quot; });
            });
        }

        function animateMerge() {
            if (state.step &lt; 1.5) { animateArrange(); setTimeout(animateMerge, 2200); return; }
            if (state.step &gt;= 2) return;
            state.step = 2;
            const { r } = state;
            state.objects.forEach((mesh, i) =&gt; {
                const isFirstHalf = i &lt; (state.slices / 2);
                const finalZ = isFirstHalf ? -r/2 : r/2;
                gsap.to(mesh.position, { z: finalZ, duration: 2, ease: &quot;power2.inOut&quot; });
            });
        }

        function autoPlayVolume() {
            resetScene();
            createCylinder();
            setTimeout(animateCut, 500);
            setTimeout(animateArrange, 2500);
            setTimeout(animateMerge, 5500);
        }

        function updateLabels() {
            const { r, h } = state;
            if (state.step === 0) {
                document.getElementById('label-rect-l').style.opacity = 0;
                document.getElementById('label-rect-w').style.opacity = 0;
                document.getElementById('label-rect-h').style.opacity = 0;

                const pR = new THREE.Vector3(r/2, h, 0);
                const pH = new THREE.Vector3(r + 0.5, h/2, 0);
                [{ vec: pR, id: 'label-r', text: `${(Math.PI * r * r).toFixed(0)}cm&sup2;` }, { vec: pH, id: 'label-h', text: `${h}cm` }].forEach(item =&gt; {
                    const pos = item.vec.clone().project(camera);
                    const x = (pos.x * .5 + .5) * renderer.domElement.clientWidth;
                    const y = (pos.y * -.5 + .5) * renderer.domElement.clientHeight;
                    const el = document.getElementById(item.id);
                    el.style.left = `${x}px`; el.style.top = `${y}px`; el.style.opacity = 1; el.textContent = item.text;
                });
            } else if (state.step === 2) {
                document.getElementById('label-r').style.opacity = 0;
                document.getElementById('label-h').style.opacity = 0;
                const pL = new THREE.Vector3(0, h + 0.5, -r/2);
                const pW = new THREE.Vector3(r * Math.PI / 2 + 0.5, 0.2, -r/2);
                const pH = new THREE.Vector3(-r * Math.PI / 2 - 0.5, h/2, -r/2);
                [
                    { vec: pL, id: 'label-rect-l', text: `长(&pi;r)` },
                    { vec: pW, id: 'label-rect-w', text: `宽(r)` },
                    { vec: pH, id: 'label-rect-h', text: `高(h)` }
                ].forEach(item =&gt; {
                    const pos = item.vec.clone().project(camera);
                    const x = (pos.x * .5 + .5) * renderer.domElement.clientWidth;
                    const y = (pos.y * -.5 + .5) * renderer.domElement.clientHeight;
                    const el = document.getElementById(item.id);
                    el.style.left = `${x}px`; el.style.top = `${y}px`; el.style.opacity = 1; el.textContent = item.text;
                });
            } else {
                document.querySelectorAll('.label-3d').forEach(el =&gt; el.style.opacity = 0);
            }
        }

        function onResize() {
            const container = document.getElementById('three-canvas');
            if (!container) return;
            const width = container.clientWidth;
            const height = container.clientHeight;
            
            camera.aspect = width / height;
            camera.updateProjectionMatrix();
            
            // 强制更新渲染器尺寸和像素比
            renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
            renderer.setSize(width, height, false);
        }

        function animate() {
            requestAnimationFrame(animate);
            
            // 实时检测容器尺寸变化（应对演示模式切换时的延迟渲染）
            const container = document.getElementById('three-canvas');
            if (container) {
                const currentWidth = container.clientWidth;
                const currentHeight = container.clientHeight;
                const canvasWidth = renderer.domElement.width / renderer.getPixelRatio();
                const canvasHeight = renderer.domElement.height / renderer.getPixelRatio();

                if (Math.abs(currentWidth - canvasWidth) &gt; 1 || Math.abs(currentHeight - canvasHeight) &gt; 1) {
                    onResize();
                }
            }

            controls.update();
            updateLabels();
            renderer.render(scene, camera);
        }

        init();
    &lt;/script&gt;

        (function() {
            const canvas = document.getElementById('drawing-canvas');
            const ctx = canvas.getContext('2d');
            const penTool = document.getElementById('pen-tool');
            const eraserTool = document.getElementById('eraser-tool');
            const clearTool = document.getElementById('clear-tool');

            let isDrawing = false;
            let currentMode = 'pen'; 

            function resizeCanvas() {
                const rect = canvas.getBoundingClientRect();
                // 考虑设备像素比以防模糊
                const dpr = window.devicePixelRatio || 1;
                canvas.width = rect.width * dpr;
                canvas.height = rect.height * dpr;
                ctx.scale(dpr, dpr);
                
                ctx.lineCap = 'round';
                ctx.lineJoin = 'round';
            }

            window.addEventListener('load', resizeCanvas);
            window.addEventListener('resize', resizeCanvas);
            resizeCanvas();

            penTool.onclick = () =&gt; {
                currentMode = 'pen';
                penTool.classList.add('active');
                eraserTool.classList.remove('active');
            };

            eraserTool.onclick = () =&gt; {
                currentMode = 'eraser';
                eraserTool.classList.add('active');
                penTool.classList.remove('active');
            };

            clearTool.onclick = () =&gt; {
                ctx.clearRect(0, 0, canvas.width, canvas.height);
            };

            function getPos(e) {
                const rect = canvas.getBoundingClientRect();
                const clientX = e.clientX || (e.touches &amp;&amp; e.touches[0].clientX);
                const clientY = e.clientY || (e.touches &amp;&amp; e.touches[0].clientY);
                return {
                    x: clientX - rect.left,
                    y: clientY - rect.top
                };
            }

            function startDrawing(e) {
                isDrawing = true;
                const pos = getPos(e);
                ctx.beginPath();
                ctx.moveTo(pos.x, pos.y);
            }

            function draw(e) {
                if (!isDrawing) return;
                const pos = getPos(e);

                if (currentMode === 'eraser') {
                    ctx.globalCompositeOperation = 'destination-out';
                    ctx.lineWidth = 30;
                } else {
                    ctx.globalCompositeOperation = 'source-over';
                    ctx.strokeStyle = '#ff0000';
                    ctx.lineWidth = 4;
                }

                ctx.lineTo(pos.x, pos.y);
                ctx.stroke();
            }

            function stopDrawing() {
                isDrawing = false;
            }

            canvas.addEventListener('mousedown', startDrawing);
            canvas.addEventListener('mousemove', draw);
            window.addEventListener('mouseup', stopDrawing);

            canvas.addEventListener('touchstart', (e) =&gt; { e.preventDefault(); startDrawing(e); });
            canvas.addEventListener('touchmove', (e) =&gt; { e.preventDefault(); draw(e); });
            canvas.addEventListener('touchend', stopDrawing);
        })();
    &lt;/script&gt;

            state.timerInterval = setInterval(() =&gt; {

                let m = Math.floor(state.elapsedTime / 60).toString().padStart(2, '0');
                let s = (state.elapsedTime % 60).toString().padStart(2, '0');
                timerEl.textContent = m + &quot;:&quot; + s;
            }, 1000);
        }

        function renderQuestion(teamNum) {
            const team = state[&quot;team&quot; + teamNum];
            const q = questions[team.current];
            document.getElementById(&quot;info&quot; + teamNum).textContent = &quot;第&quot; + (team.current + 1) + &quot;题 | 共5题&quot;;
            document.getElementById(&quot;text&quot; + teamNum).textContent = q.text;
            
            const steps = document.querySelectorAll(&quot;#progress&quot; + teamNum + &quot; .progress-step&quot;);
            steps.forEach((s, i) =&gt; s.classList.toggle('active', i &lt;= team.current));

            const visual = document.getElementById(&quot;visual&quot; + teamNum);
            visual.innerHTML = '';
            if (q.type === 'image') {
                const imgUrl = q.teamImages[teamNum - 1];
                visual.innerHTML = '&lt;img src=&quot;' + imgUrl + '&quot;&gt;';
            }

            const optionsBox = document.getElementById(&quot;options&quot; + teamNum);
            optionsBox.innerHTML = '';
            q.options.forEach((opt, idx) =&gt; {
                const btn = document.createElement('button');
                btn.className = 'option-btn';
                btn.textContent = opt;
                btn.onclick = () =&gt; selectAnswer(teamNum, idx, btn);
                optionsBox.appendChild(btn);
            });
            team.answered = false;
        }

        function selectAnswer(teamNum, idx, btn) {
            const team = state[&quot;team&quot; + teamNum];
            if (team.answered) return;
            team.answered = true;
            
            const btns = document.querySelectorAll(&quot;#options&quot; + teamNum + &quot; .option-btn&quot;);
            btns.forEach(b =&gt; b.classList.remove('selected'));
            btn.classList.add('selected');
            
            team.userAnswers[team.current] = idx;
            
            if (idx === questions[team.current].answer) {
                team.score++;
            }
            
            anime({ 
                targets: btn, 
                scale: [1, 1.05, 1], 
                duration: 300,
                complete: () =&gt; {
                    // 延迟一小段时间后自动进入下一题，给用户一点视觉反馈
                    setTimeout(() =&gt; {
                        nextQuestion(teamNum);
                    }, 300);
                }
            });
        }

        function nextQuestion(teamNum) {
            const team = state[&quot;team&quot; + teamNum];
            // 去掉 !team.answered 的限制，因为 selectAnswer 已经处理了逻辑

            if (team.current &lt; 4) {
                team.current++;
                renderQuestion(teamNum);
                anime({ targets: &quot;#side&quot; + teamNum, opacity: [0, 1], duration: 400, easing: 'easeOutQuad' });
            } else {
                if (!team.finishTime) {
                    team.finishTime = state.elapsedTime;
                }
                if (state.team1.finishTime &amp;&amp; state.team2.finishTime) {
                    clearInterval(state.timerInterval);
                    showResult();
                }
            }
        }

        function showResult() {
            const overlay = document.getElementById('resultOverlay');
            overlay.style.display = 'block';

            const t1 = state.team1;
            const t2 = state.team2;

            const s1 = t1.score * 20;
            const s2 = t2.score * 20;

            document.getElementById('score1').textContent = s1;
            document.getElementById('score2').textContent = s2;
            document.getElementById('time1').textContent = t1.finishTime;
            document.getElementById('time2').textContent = t2.finishTime;

            let winner = 0;
            if (s1 &gt; s2) winner = 1;
            else if (s2 &gt; s1) winner = 2;
            else {
                if (t1.finishTime &lt; t2.finishTime) winner = 1;
                else if (t2.finishTime &lt; t1.finishTime) winner = 2;
            }

            if (winner === 1) document.getElementById('winBadge1').style.display = 'block';
            if (winner === 2) document.getElementById('winBadge2').style.display = 'block';

            anime({
                targets: '.result-side',
                translateY: [100, 0],
                opacity: [0, 1],
                delay: anime.stagger(200),
                easing: 'easeOutExpo'
            });
        }

        function openReview(teamNum) {
            state.reviewTeam = teamNum;
            state.reviewIndex = 0;
            document.getElementById('reviewOverlay').style.display = 'flex';
            document.getElementById('reviewTitle').textContent = &quot;错题回顾 - 队伍 &quot; + teamNum;
            renderReviewItem();
        }

        function closeReview() {
            document.getElementById('reviewOverlay').style.display = 'none';
        }

        function renderReviewItem() {
            const team = state[&quot;team&quot; + state.reviewTeam];
            const wrongIndices = questions.map((q, i) =&gt; i).filter(i =&gt; team.userAnswers[i] !== questions[i].answer);
            const body = document.getElementById('reviewBody');
            
            if (wrongIndices.length === 0) {
                body.innerHTML = '&lt;div style=&quot;text-align:center; padding: 50px; font-size: 24px; color: #64748b;&quot;&gt;太棒了！没有错题。&lt;/div&gt;';
                return;
            }

            if (state.reviewIndex &gt;= wrongIndices.length) state.reviewIndex = wrongIndices.length - 1;
            if (state.reviewIndex &lt; 0) state.reviewIndex = 0;

            const actualIndex = wrongIndices[state.reviewIndex];
            const q = questions[actualIndex];
            const userAns = team.userAnswers[actualIndex];
            
            let visualHtml = '';
            if (q.type === 'image') {
                visualHtml = '&lt;img src=&quot;' + q.teamImages[state.reviewTeam-1] + '&quot; style=&quot;max-width: 100%; max-height: 160px; object-fit: contain; margin: 10px 0;&quot;&gt;';
            }

            let optionsHtml = q.options.map((opt, idx) =&gt; {
                let statusClass = '';
                let label = '';
                if (idx === q.answer) {
                    statusClass = 'correct';
                    label = ' (正确答案)';
                } else if (idx === userAns) {
                    statusClass = 'wrong';
                    label = ' (你的选择)';
                }
                return '&lt;div class=&quot;option-btn ' + statusClass + '&quot; style=&quot;cursor: default;&quot;&gt;' + opt + label + '&lt;/div&gt;';
            }).join('');

            body.innerHTML = 
                '&lt;div style=&quot;font-size: 18px; color: #64748b; margin-bottom: 10px;&quot;&gt;错题 ' + (state.reviewIndex + 1) + ' / ' + wrongIndices.length + '&lt;/div&gt;' +
                '&lt;div style=&quot;font-size: 24px; font-weight: bold; margin-bottom: 20px;&quot;&gt;' + q.text + '&lt;/div&gt;' +
                '&lt;div style=&quot;display: flex; justify-content: center;&quot;&gt;' + visualHtml + '&lt;/div&gt;' +
                '&lt;div class=&quot;options-container&quot; style=&quot;margin-top: 20px;&quot;&gt;' + optionsHtml + '&lt;/div&gt;';
        }

        function prevReview() {
            if (state.reviewIndex &gt; 0) {
                state.reviewIndex--;
                renderReviewItem();
            }
        }

        function nextReview() {
            const team = state[&quot;team&quot; + state.reviewTeam];
            const wrongIndices = questions.map((q, i) =&gt; i).filter(i =&gt; team.userAnswers[i] !== questions[i].answer);
            if (state.reviewIndex &lt; wrongIndices.length - 1) {
                state.reviewIndex++;
                renderReviewItem();
            }
        }
    &lt;/script&gt;
&lt;/template&gt;

        let page2Step = 0;
        function handlePage2Click(event) {
            if (event.target.classList.contains('click-area')) return;
            if (page2Step === 0) {
                document.getElementById('page2-step1').classList.add('visible');

            } else if (page2Step === 1) {

            // 如果点击的是按钮区域，不触发蒙版逻辑

            if (event.target.classList.contains('click-area')) return;

                document.getElementById('page4-step1').classList.add('visible');
                page4Step = 1;
            } else if (page4Step === 1) {

                page4Step = 2;
            } else if (page4Step === 2) {
                document.getElementById('page4-step3').classList.add('visible');
                page4Step = 3;
            }
        }

        function updateSlider() {
            slider.style.transform = `translateX(-${currentIndex * 100}vw)`;
            
            dots.forEach((dot, index) =&gt; {
                dot.classList.toggle('active', index === currentIndex);
            });
        }

        // 支持触摸滑动
        let touchStartX = 0;
        let touchEndX = 0;

        window.addEventListener('touchstart', e =&gt; {
            touchStartX = e.changedTouches[0].screenX;
        });

        window.addEventListener('touchend', e =&gt; {
            touchEndX = e.changedTouches[0].screenX;
            handleSwipe();
        });

        function handleSwipe() {
            const swipeThreshold = 50;
            if (touchStartX - touchEndX &gt; swipeThreshold) {
                if (currentIndex &lt; totalSlides - 1) {
                    currentIndex++;
                    updateSlider();
                }
            } else if (touchEndX - touchStartX &gt; swipeThreshold) {
                if (currentIndex &gt; 0) {
                    currentIndex--;
                    updateSlider();
                }
            }
        }

    &lt;script&gt;
        let currentStep = 0;
        let isPage2 = false;

        function handleNextStep(event) {
            event.stopPropagation();
            const container = document.getElementById('mainContainer');
            const nextBtn = document.getElementById('nextBtn');
            const errorBtn = document.getElementById('errorBtn');
            const stepsWrapper = document.getElementById('stepsWrapper');
            container.classList.remove('page-1');
            container.classList.add('page-2');
            nextBtn.classList.add('hidden');
            errorBtn.classList.remove('hidden');
            stepsWrapper.classList.remove('hidden');
            isPage2 = true;
        }

        function handlePageClick(event) {
            if (!isPage2 || currentStep &gt;= 3) return;
            currentStep++;
            if (currentStep === 1) document.getElementById('step1').classList.add('show');
            else if (currentStep === 2) document.getElementById('step2').classList.add('show');
            else if (currentStep === 3) document.getElementById('step3').classList.add('show');
        }

        function handleFinalNext(event) {
            event.stopPropagation();
            alert(&quot;正在进入下一页内容...&quot;);
        }

        function checkAnswers(event) {
            event.stopPropagation();
            const inputs = [
                document.getElementById('ans1_1').innerText.trim(),
                document.getElementById('ans2_1').innerText.trim(),
                document.getElementById('ans2_2').innerText.trim(),
                document.getElementById('ans2_3').innerText.trim(),
                document.getElementById('ans3_1').innerText.trim(),
                document.getElementById('ans3_2').innerText.trim()
            ];

            if (inputs.some(val =&gt; val === &quot;&quot;)) {
                alert(&quot;请完成所有填空后再查看错因分析哦！&quot;);
                return;
            }

            if (inputs[0] === &quot;4&quot;) {
                showFeedback('https://musk-online.fbcontent.cn/pub-musk-ai-studio/user/upload/20/rgnu78gNxk5qAEjeLzmaCS.png');
            } else if (inputs[2] === &quot;0.8&quot;) {
                showFeedback('https://musk-online.fbcontent.cn/pub-musk-ai-studio/user/upload/20/qwcSCpJkZQ3mrh2BkMHDCL.png');
            } else {
                const correct = [&quot;2&quot;, &quot;2&quot;, &quot;0.5&quot;, &quot;6.28&quot;, &quot;6.28&quot;, &quot;12.56&quot;];
                const isAllCorrect = inputs.every((val, idx) =&gt; val === correct[idx]);
                if (isAllCorrect) alert(&quot;太棒了！全部正确！&quot;);
                else alert(&quot;答案中还有些小错误，再检查一下吧！&quot;);
            }
        }

        function showFeedback(imgUrl) {
            const overlay = document.getElementById('feedbackOverlay');
            const card = document.getElementById('feedbackCard');
            card.style.backgroundImage = `url('${imgUrl}')`;
            overlay.classList.remove('hidden');
        }

        function closeFeedback() {
            document.getElementById('feedbackOverlay').classList.add('hidden');
        }

        &lt;/div&gt;

            &lt;div class=&quot;back-area&quot; onclick=&quot;hwGoToSlide(0)&quot;&gt;&lt;/div&gt;
            &lt;img src=&quot;https://musk-online.fbcontent.cn/pub-musk-ai-studio/user/upload/20/sCCjNfRjbwERi32RH78ZKU.png&quot; alt=&quot;课后作业 02&quot;&gt;
        &lt;/div&gt;
    &lt;/div&gt;

    &lt;script&gt;
        (function() {
            let currentIndex = 0;
            const slider = document.getElementById('hw-slider');
            let startX = 0;

            window.hwGoToSlide = function(index) {
                currentIndex = index;
                slider.style.transform = `translateX(-${currentIndex * 50}%)`;
            };

            // 触摸滑动支持
            slider.addEventListener('touchstart', e =&gt; {
                startX = e.touches[0].clientX;
            });

            slider.addEventListener('touchend', e =&gt; {
                const endX = e.changedTouches[0].clientX;
                const diff = startX - endX;

                if (Math.abs(diff) &gt; 50) { // 滑动阈值
                    if (diff &gt; 0 &amp;&amp; currentIndex &lt; 1) {
                        hwGoToSlide(1);
                    } else if (diff &lt; 0 &amp;&amp; currentIndex &gt; 0) {
                        hwGoToSlide(0);
                    }
                }
            });

            // 鼠标滑动模拟（可选）
            slider.addEventListener('mousedown', e =&gt; {
                startX = e.clientX;
            });

            slider.addEventListener('mouseup', e =&gt; {
                const endX = e.clientX;
                const diff = startX - endX;

                if (Math.abs(diff) &gt; 50) {
                    if (diff &gt; 0 &amp;&amp; currentIndex &lt; 1) {
                        hwGoToSlide(1);
                    } else if (diff &lt; 0 &amp;&amp; currentIndex &gt; 0) {
                        hwGoToSlide(0);
                    }
                }
            });
        })();
    &lt;/script&gt;

<script>

    function getIsMobile() {
        const width = document.documentElement.clientWidth
        const isMobile = /Android|webOS|iPhone|iPod|BlackBerry|iPad|Windows Phone|Mobile/i.test(navigator.userAgent) || width <= 768
        return isMobile
    }

    // 打开飞象老师官网
    function openFeixiangTeacher(event) {
        const isMobile = getIsMobile()

        // 判断是否为移动端浏览器
        if (isMobile) {
            // 移动端不跳转
            return
        }
        window.open('https://www.feixianglaoshi.com', '_blank')
    }


    // ==================== 埋点相关代码 ====================

    /**
     * 页面停留时长统计
     */
    (function () {
        let startTime = null
        let totalTime = 0
        let reportTimer = null // 防抖定时器

        // 开始计时
        function startTimer() {
            if (!startTime) {
                startTime = Date.now()
                console.log('[埋点] 开始计时')
            }
        }

        // 停止计时并累加时长
        function stopTimer() {
            if (startTime) {
                totalTime += Date.now() - startTime
                startTime = null
                console.log('[埋点] 停止计时，累计时长:', Math.floor(totalTime / 1000), '秒')
            }
        }

        // 检查页面是否真正可见
        function isPageVisible() {
            // 检查 document.hidden
            if (document.hidden) {
                return false
            }

            // 检查 document.visibilityState
            if (document.visibilityState && document.visibilityState !== 'visible') {
                return false
            }

            // 检查窗口是否有焦点
            if (!document.hasFocus()) {
                return false
            }

            return true
        }

        // 上报停留时长（带防抖）
        function reportStayTime(eventType, immediate = false) {
            stopTimer()

            // 清除之前的定时器
            if (reportTimer) {
                clearTimeout(reportTimer)
                reportTimer = null
            }

            // 如果是立即上报（如页面卸载），不使用防抖
            if (immediate) {
                doReport(eventType)
                return
            }

            // 使用防抖，避免短时间内多次上报
            // 100ms 内如果有多个事件触发，只上报最后一次
            reportTimer = setTimeout(function () {
                doReport(eventType)
                reportTimer = null
            }, 100)
        }

        // 实际执行上报
        function doReport(eventType) {
            if (window.frog && totalTime > 0) {
                const serverData = window.__SERVER_DATA__ || {}
                const chatId = serverData.watermarkChatId
                window.frog.add({
                    url: '/time/HtmlPage/enter',
                    eventId: 42818,
                    customExtend: {
                        chat_id: chatId,
                        use_time: Math.floor(totalTime / 1000), // 转换为秒
                    },
                    duration: Math.floor(totalTime / 1000), // 转换为秒,
                    currentPage: 'HtmlPage',
                    eventAction: 'time',
                    eventName: 'enter'
                })
                console.log(`[埋点] 页面停留时长上报 (${eventType}):`, Math.floor(totalTime / 1000), '秒')

                // 上报后重置累计时长，为下次统计做准备
                totalTime = 0
            }
        }

        // 清理函数：移除所有事件监听器
        function cleanup() {
            console.log('[埋点] 清理计时器资源')

            // 清除防抖定时器
            if (reportTimer) {
                clearTimeout(reportTimer)
                reportTimer = null
            }

            // 移除事件监听器
            document.removeEventListener('visibilitychange', handleVisibilityChange)
            window.removeEventListener('blur', handleBlur)
            window.removeEventListener('focus', handleFocus)
            window.removeEventListener('beforeunload', handleBeforeUnload)
            window.removeEventListener('pagehide', handlePageHide)

            // 重置变量
            startTime = null
            totalTime = 0
        }

        // 事件处理函数（需要命名以便移除）
        function handleVisibilityChange() {
            if (document.hidden) {
                // 页面不可见，停止计时并上报
                console.log('[埋点] visibilitychange - 页面隐藏')
                reportStayTime('visibilitychange')
            } else {
                // 页面可见，开始新的计时
                console.log('[埋点] visibilitychange - 页面显示，开始新的计时')
                startTimer()
            }
        }

        function handleBlur() {
            // 窗口失去焦点，停止计时并上报
            console.log('[埋点] blur - 窗口失去焦点')
            reportStayTime('blur')
        }

        function handleFocus() {
            // 窗口获得焦点，开始新的计时
            console.log('[埋点] focus - 窗口获得焦点，开始新的计时')
            startTimer()
        }

        function handleBeforeUnload() {
            // 页面卸载前立即上报（不使用防抖）
            console.log('[埋点] beforeunload - 页面即将卸载')
            reportStayTime('beforeunload', true)
            cleanup()
        }

        function handlePageHide() {
            // 页面隐藏时立即上报（iOS Safari 更可靠，不使用防抖）
            console.log('[埋点] pagehide - 页面隐藏')
            reportStayTime('pagehide', true)
        }

        function handleDOMContentLoaded() {
            if (isPageVisible()) {
                startTimer()
            }
        }

        // 监听页面可见性变化
        document.addEventListener('visibilitychange', handleVisibilityChange)

        // 监听窗口失去/获得焦点
        window.addEventListener('blur', handleBlur)
        window.addEventListener('focus', handleFocus)

        // 页面加载完成后开始计时
        if (document.readyState === 'loading') {
            window.addEventListener('DOMContentLoaded', handleDOMContentLoaded)
        } else {
            if (isPageVisible()) {
                startTimer()
            }
        }

        // 页面卸载时上报
        window.addEventListener('beforeunload', handleBeforeUnload)

        // 兼容性：监听 pagehide 事件（iOS Safari 更可靠）
        window.addEventListener('pagehide', handlePageHide)
    })()

    /**
     * 点击飞象老师 Logo 的埋点
     */
    function trackLogoClick(event) {
        // 阻止事件冒泡，避免触发 HTML 点击埋点
        event.stopPropagation()

        if (window.frog) {
            const serverData = window.__SERVER_DATA__ || {}
            const chatId = serverData.watermarkChatId
            console.log('trackHtmlClick', chatId)

            window.frog.add({
                url: '/click/HtmlPage/logo',
                eventId: 42816,
                customExtend: {
                    chat_id: chatId,
                },
                currentPage: 'HtmlPage',
                eventAction: 'click',
                eventName: 'logo'
            })

            console.log('[埋点] 点击飞象老师 Logo')
        }
    }

    /**
     * 点击立即体验的埋点
     */
    function trackStartButtonClick(event) {
        // 阻止事件冒泡，避免触发 HTML 点击埋点
        event.stopPropagation()

        if (window.frog) {
            const serverData = window.__SERVER_DATA__ || {}
            const chatId = serverData.watermarkChatId
            console.log('trackHtmlClick', chatId)
            window.frog.add({
                url: '/click/HtmlPage/start',
                eventId: 42817,
                customExtend: {
                    chat_id: chatId
                },
                currentPage: 'HtmlPage',
                eventAction: 'click',
                eventName: 'start'
            })
            console.log('[埋点] 点击立即体验')
        }
    }

    // 绑定点击事件
    document.addEventListener('DOMContentLoaded', function () {
        // 绑定 Logo 点击埋点和跳转功能
        const logoElement = document.querySelector('.left-watermark-content')
        if (logoElement) {
            logoElement.addEventListener('click', function (event) {
                trackLogoClick(event)
                openFeixiangTeacher(event)
            })
        }

        // 绑定立即体验按钮点击埋点和跳转功能
        const startButton = document.querySelector('.jump-button')
        if (startButton) {
            startButton.addEventListener('click', function (event) {
                trackStartButtonClick(event)
                openFeixiangTeacher(event)
            })
        }

        // 绑定水印覆盖层点击（整体区域）
        const watermarkOverlay = document.querySelector('.watermark-overlay')
        if (watermarkOverlay) {
            watermarkOverlay.addEventListener('click', function (event) {
                // 如果点击的不是 logo 或按钮，则触发跳转
                const target = event.target
                const isLogo = target.closest('.left-watermark-content')
                const isButton = target.closest('.jump-button')

                if (!isLogo && !isButton) {
                    openFeixiangTeacher(event)
                }
            })
        }
    })

    // ==================== 原有功能代码 ====================

    function adjustRem() {
        const pcBaseWidth = 375 // 设计稿
        const width = document.documentElement.clientWidth
        document.documentElement.style.fontSize = `${(width / pcBaseWidth * 100).toFixed(2)}px`
    }


    // 移动端检测和按钮隐藏逻辑
    function checkAndHideButtonOnMobile() {
        const isMobile = getIsMobile()
        if (isMobile) {
            adjustRem()
        }
        const jumpButton = document.querySelector('.right-watermark-content .jump-button');
        const iframeContainer = document.querySelector('.iframe-container');

        if (isMobile && jumpButton) {
            jumpButton.style.display = 'none';
        } else {
            jumpButton.style.display = 'flex'
        }

        // 移动端时给iframe-container添加类名，否则移除类名
        if (iframeContainer) {
            if (isMobile) {
                iframeContainer.classList.add('mobile');
            } else {
                iframeContainer.classList.remove('mobile');
            }
        }
    }


    function handleResize() {
        // 响应式处理：重新检测移动端并处理按钮显示/隐藏
        checkAndHideButtonOnMobile();

        // 在窗口大小变化时，重新应用移动端相关的逻辑
        const isMobile = getIsMobile()
        const watermarkOverlay = document.querySelector('.watermark-overlay');
        const iframeContainer = document.querySelector('.iframe-container');

        // 根据当前设备类型调整水印覆盖层的点击行为
        if (watermarkOverlay) {
            if (isMobile) {
                // 移动端：移除点击事件或设置为空函数
                watermarkOverlay.onclick = function () {
                    // 移动端不执行跳转
                    return;
                };
            } else {
                // 桌面端：恢复正常的点击跳转功能
                watermarkOverlay.onclick = openFeixiangTeacher;
            }
        }

        // 确保在resize时也能正确添加或移除mobile类
        if (iframeContainer) {
            if (isMobile) {
                iframeContainer.classList.add('mobile');
            } else {
                iframeContainer.classList.remove('mobile');
            }
        }
    }

    // 防止iframe内容溢出
    window.addEventListener('resize', handleResize);

    // 页面加载完成后执行移动端检测
    document.addEventListener('DOMContentLoaded', checkAndHideButtonOnMobile);

    // 清理所有事件绑定的函数
    function clearAllEvents() {
        // 清除 resize 事件监听器
        window.removeEventListener('resize', handleResize);

        // 清除 DOMContentLoaded 事件监听器
        document.removeEventListener('DOMContentLoaded', checkAndHideButtonOnMobile);
    }

    // 页面卸载时自动清理事件（可选）
    window.addEventListener('beforeunload', clearAllEvents);
