            background-size: 30px 30px;
        }

        .card {
            background: var(--background);
            border: 1px solid rgba(0, 0, 0, 0.3);
            border-radius: 20px;
            padding: 16px;
        }

        .label { font-size: 22px; font-weight: 300; margin-bottom: 8px; }
        
        .btn-group { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }
        .btn {
            height: 80px;
            font-size: 28px;
            font-weight: 500;
            border-radius: 20px;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: transform 0.1s;
        }
        .btn:active { transform: scale(0.95); }
        .btn-primary { background: var(--foreground); color: var(--primary); border: 1px solid var(--foreground); }
        .btn-secondary { background: var(--secondary); color: var(--foreground); border: 1px solid var(--foreground); }

        select {
            width: 100%;
            height: 60px;
            font-size: 24px;
            border-radius: 12px;
            padding: 0 10px;
            border: 1px solid var(--foreground);
            background: var(--secondary);
            color: var(--foreground);
        }

        .formula-card {
            font-size: 30px;
            font-weight: 600;
            text-align: center;
            min-height: 100px;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        #dot-container {
            display: grid;
            gap: 10px;
            padding: 20px;
            max-width: 90%;
            max-height: 90%;
            margin: auto;
        }

        .dot {
            width: 30px;
            height: 30px;
            border-radius: 2px;
            transition: all 0.3s ease;
        }

        #feedback {
            position: absolute;
            bottom: 40px;
            font-size: 32px;
            font-weight: 700;
            padding: 10px 30px;
            border-radius: 40px;
            display: none;
            z-index: 10;
        }
        .correct { background: #33FCB4; color: #012419; border: 2px solid #118D7E; }
        .wrong { background: #D947F2; color: #FFFFFF; border: 2px solid #7A1957; }

        #answer-input {
            width: 100%;
            height: 80px;
            font-size: 36px;
            text-align: center;
            border: 2px solid var(--foreground);
            border-radius: 20px;
            background: var(--secondary);
            color: var(--foreground);
            margin-top: 10px;
        }
        
        /* 数字小键盘 */
        .numpad {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 8px;
            margin-top: 10px;
        }
        .num-btn {
            height: 60px;
            font-size: 24px;
            border: 1px solid var(--foreground);
            border-radius: 10px;
            background: var(--secondary);
            cursor: pointer;
        }
    &lt;/style&gt;

    &lt;header&gt;
        &lt;h1&gt;乘法口诀互动点阵图&lt;/h1&gt;
    &lt;/header&gt;

    &lt;main&gt;
        &lt;aside id=&quot;controls&quot;&gt;
            &lt;div class=&quot;card&quot;&gt;
                &lt;div class=&quot;label&quot;&gt;选择口诀范围&lt;/div&gt;
                &lt;select id=&quot;range-select&quot;&gt;
                    &lt;option value=&quot;2&quot;&gt;2的乘法口诀&lt;/option&gt;
                    &lt;option value=&quot;3&quot;&gt;3的乘法口诀&lt;/option&gt;
                    &lt;option value=&quot;4&quot;&gt;4的乘法口诀&lt;/option&gt;
                    &lt;option value=&quot;5&quot;&gt;5的乘法口诀&lt;/option&gt;
                    &lt;option value=&quot;6&quot;&gt;6的乘法口诀&lt;/option&gt;
                    &lt;option value=&quot;7&quot;&gt;7的乘法口诀&lt;/option&gt;
                    &lt;option value=&quot;8&quot;&gt;8的乘法口诀&lt;/option&gt;
                    &lt;option value=&quot;9&quot;&gt;9的乘法口诀&lt;/option&gt;
                &lt;/select&gt;
            &lt;/div&gt;

            &lt;div class=&quot;card formula-card&quot; id=&quot;question-display&quot;&gt;
                口诀生成中...
            &lt;/div&gt;

            &lt;div class=&quot;card&quot;&gt;
                &lt;div class=&quot;label&quot;&gt;请输入积是多少&lt;/div&gt;
                &lt;input type=&quot;number&quot; id=&quot;answer-input&quot; readonly placeholder=&quot;?&quot;&gt;
                &lt;div class=&quot;numpad&quot;&gt;
                    &lt;button class=&quot;num-btn&quot; onclick=&quot;appendNum(1)&quot;&gt;1&lt;/button&gt;
                    &lt;button class=&quot;num-btn&quot; onclick=&quot;appendNum(2)&quot;&gt;2&lt;/button&gt;
                    &lt;button class=&quot;num-btn&quot; onclick=&quot;appendNum(3)&quot;&gt;3&lt;/button&gt;
                    &lt;button class=&quot;num-btn&quot; onclick=&quot;appendNum(4)&quot;&gt;4&lt;/button&gt;
                    &lt;button class=&quot;num-btn&quot; onclick=&quot;appendNum(5)&quot;&gt;5&lt;/button&gt;
                    &lt;button class=&quot;num-btn&quot; onclick=&quot;appendNum(6)&quot;&gt;6&lt;/button&gt;
                    &lt;button class=&quot;num-btn&quot; onclick=&quot;appendNum(7)&quot;&gt;7&lt;/button&gt;
                    &lt;button class=&quot;num-btn&quot; onclick=&quot;appendNum(8)&quot;&gt;8&lt;/button&gt;
                    &lt;button class=&quot;num-btn&quot; onclick=&quot;appendNum(9)&quot;&gt;9&lt;/button&gt;
                    &lt;button class=&quot;num-btn&quot; onclick=&quot;clearNum()&quot;&gt;重置&lt;/button&gt;
                    &lt;button class=&quot;num-btn&quot; onclick=&quot;appendNum(0)&quot;&gt;0&lt;/button&gt;
                    &lt;button class=&quot;num-btn&quot; style=&quot;background:var(--accent); color:white;&quot; onclick=&quot;checkAnswer()&quot;&gt;提交&lt;/button&gt;
                &lt;/div&gt;
            &lt;/div&gt;

            &lt;div class=&quot;btn-group&quot;&gt;
                &lt;button class=&quot;btn btn-primary&quot; onclick=&quot;generateQuestion()&quot;&gt;下一题&lt;/button&gt;
                &lt;button class=&quot;btn btn-secondary&quot; onclick=&quot;resetApp()&quot;&gt;重置&lt;/button&gt;
            &lt;/div&gt;
        &lt;/aside&gt;

        &lt;section id=&quot;stage&quot;&gt;
            &lt;div id=&quot;dot-container&quot;&gt;&lt;/div&gt;
            &lt;div id=&quot;feedback&quot;&gt;&lt;/div&gt;
        &lt;/section&gt;
    &lt;/main&gt;

    &lt;script&gt;
        let currentA = 0;
        let currentB = 0;
        let correctAnswer = 0;

        const rangeSelect = document.getElementById('range-select');
        const questionDisplay = document.getElementById('question-display');
        const answerInput = document.getElementById('answer-input');
        const dotContainer = document.getElementById('dot-container');
        const feedback = document.getElementById('feedback');

        function generateQuestion() {
            const range = parseInt(rangeSelect.value);
            currentA = range;
            const prevB = currentB;
            // 确保连续两次题目不完全相同（除非范围仅为 1）
            do {
                currentB = Math.floor(Math.random() * 9) + 1;
            } while (currentB === prevB &amp;&amp; rangeSelect.options.length &gt; 1);
            
            correctAnswer = currentA * currentB;
            
            clearNum();
            feedback.style.display = 'none';
            updateUI();
        }

        function updateUI() {
            // 更新公式文本 (LaTeX)
            questionDisplay.innerHTML = `\\(${currentA} \\times ${currentB} = ?\\)`;
            MathJax.typesetPromise();

            // 更新点阵图
            renderDots();
        }

        function renderDots() {
            dotContainer.innerHTML = '';
            dotContainer.style.gridTemplateColumns = `repeat(${currentB}, 30px)`;
            dotContainer.style.gridTemplateRows = `repeat(${currentA}, 30px)`;

            for (let i = 0; i &lt; currentA * currentB; i++) {
                const dot = document.createElement('div');
                dot.className = 'dot';
                
                // 视觉强化：每行换个颜色
                const rowIndex = Math.floor(i / currentB);
                if (rowIndex % 2 === 0) {
                    dot.style.backgroundColor = 'var(--dot-color-1)';
                    dot.style.border = '2px solid var(--dot-border-1)';
                } else {
                    dot.style.backgroundColor = 'var(--dot-color-2)';
                    dot.style.border = '2px solid var(--dot-border-2)';
                }
                
                dot.style.opacity = '0';
                dot.style.transform = 'scale(0)';
                dotContainer.appendChild(dot);
            }

            // 动画效果
            anime({
                targets: '.dot',
                scale: [0, 1],
                opacity: [0, 1],
                delay: anime.stagger(50),
                easing: 'easeOutElastic(1, .8)'
            });
        }

        function appendNum(num) {
            if (answerInput.value.length &lt; 2) {
                answerInput.value += num;
            }
        }

        function clearNum() {
            answerInput.value = '';
        }

        function checkAnswer() {
            const userAnswer = parseInt(answerInput.value);
            if (isNaN(userAnswer)) return;

            feedback.style.display = 'block';
            if (userAnswer === correctAnswer) {
                feedback.innerText = '回答正确！很好！';
                feedback.className = 'correct';
                anime({
                    targets: '.dot',
                    rotate: '1turn',
                    duration: 800,
                    easing: 'easeInOutQuad'
                });
            } else {
                feedback.innerText = '再想一想哦～';
                feedback.className = 'wrong';
                anime({
                    targets: '#answer-input',
                    translateX: [0, -10, 10, -10, 10, 0],
                    duration: 400,
                    easing: 'linear'
                });
            }
        }

        function resetApp() {
            rangeSelect.selectedIndex = 0;
            generateQuestion();
        }

        // 初始化
        window.onload = () =&gt; {
            generateQuestion();
        };

        rangeSelect.onchange = generateQuestion;
    &lt;/script&gt;

<script>

    function getIsMobile() {
        const width = document.documentElement.clientWidth
        const isMobile = /Android|webOS|iPhone|iPod|BlackBerry|iPad|Windows Phone|Mobile/i.test(navigator.userAgent) || width <= 768
        return isMobile
    }

    // 打开飞象老师官网
    function openFeixiangTeacher(event) {
        const isMobile = getIsMobile()

        // 判断是否为移动端浏览器
        if (isMobile) {
            // 移动端不跳转
            return
        }
        window.open('https://www.feixianglaoshi.com', '_blank')
    }


    // ==================== 埋点相关代码 ====================

    /**
     * 页面停留时长统计
     */
    (function () {
        let startTime = null
        let totalTime = 0
        let reportTimer = null // 防抖定时器

        // 开始计时
        function startTimer() {
            if (!startTime) {
                startTime = Date.now()
                console.log('[埋点] 开始计时')
            }
        }

        // 停止计时并累加时长
        function stopTimer() {
            if (startTime) {
                totalTime += Date.now() - startTime
                startTime = null
                console.log('[埋点] 停止计时，累计时长:', Math.floor(totalTime / 1000), '秒')
            }
        }

        // 检查页面是否真正可见
        function isPageVisible() {
            // 检查 document.hidden
            if (document.hidden) {
                return false
            }

            // 检查 document.visibilityState
            if (document.visibilityState && document.visibilityState !== 'visible') {
                return false
            }

            // 检查窗口是否有焦点
            if (!document.hasFocus()) {
                return false
            }

            return true
        }

        // 上报停留时长（带防抖）
        function reportStayTime(eventType, immediate = false) {
            stopTimer()

            // 清除之前的定时器
            if (reportTimer) {
                clearTimeout(reportTimer)
                reportTimer = null
            }

            // 如果是立即上报（如页面卸载），不使用防抖
            if (immediate) {
                doReport(eventType)
                return
            }

            // 使用防抖，避免短时间内多次上报
            // 100ms 内如果有多个事件触发，只上报最后一次
            reportTimer = setTimeout(function () {
                doReport(eventType)
                reportTimer = null
            }, 100)
        }

        // 实际执行上报
        function doReport(eventType) {
            if (window.frog && totalTime > 0) {
                const serverData = window.__SERVER_DATA__ || {}
                const chatId = serverData.watermarkChatId
                window.frog.add({
                    url: '/time/HtmlPage/enter',
                    eventId: 42818,
                    customExtend: {
                        chat_id: chatId,
                        use_time: Math.floor(totalTime / 1000), // 转换为秒
                    },
                    duration: Math.floor(totalTime / 1000), // 转换为秒,
                    currentPage: 'HtmlPage',
                    eventAction: 'time',
                    eventName: 'enter'
                })
                console.log(`[埋点] 页面停留时长上报 (${eventType}):`, Math.floor(totalTime / 1000), '秒')

                // 上报后重置累计时长，为下次统计做准备
                totalTime = 0
            }
        }

        // 清理函数：移除所有事件监听器
        function cleanup() {
            console.log('[埋点] 清理计时器资源')

            // 清除防抖定时器
            if (reportTimer) {
                clearTimeout(reportTimer)
                reportTimer = null
            }

            // 移除事件监听器
            document.removeEventListener('visibilitychange', handleVisibilityChange)
            window.removeEventListener('blur', handleBlur)
            window.removeEventListener('focus', handleFocus)
            window.removeEventListener('beforeunload', handleBeforeUnload)
            window.removeEventListener('pagehide', handlePageHide)

            // 重置变量
            startTime = null
            totalTime = 0
        }

        // 事件处理函数（需要命名以便移除）
        function handleVisibilityChange() {
            if (document.hidden) {
                // 页面不可见，停止计时并上报
                console.log('[埋点] visibilitychange - 页面隐藏')
                reportStayTime('visibilitychange')
            } else {
                // 页面可见，开始新的计时
                console.log('[埋点] visibilitychange - 页面显示，开始新的计时')
                startTimer()
            }
        }

        function handleBlur() {
            // 窗口失去焦点，停止计时并上报
            console.log('[埋点] blur - 窗口失去焦点')
            reportStayTime('blur')
        }

        function handleFocus() {
            // 窗口获得焦点，开始新的计时
            console.log('[埋点] focus - 窗口获得焦点，开始新的计时')
            startTimer()
        }

        function handleBeforeUnload() {
            // 页面卸载前立即上报（不使用防抖）
            console.log('[埋点] beforeunload - 页面即将卸载')
            reportStayTime('beforeunload', true)
            cleanup()
        }

        function handlePageHide() {
            // 页面隐藏时立即上报（iOS Safari 更可靠，不使用防抖）
            console.log('[埋点] pagehide - 页面隐藏')
            reportStayTime('pagehide', true)
        }

        function handleDOMContentLoaded() {
            if (isPageVisible()) {
                startTimer()
            }
        }

        // 监听页面可见性变化
        document.addEventListener('visibilitychange', handleVisibilityChange)

        // 监听窗口失去/获得焦点
        window.addEventListener('blur', handleBlur)
        window.addEventListener('focus', handleFocus)

        // 页面加载完成后开始计时
        if (document.readyState === 'loading') {
            window.addEventListener('DOMContentLoaded', handleDOMContentLoaded)
        } else {
            if (isPageVisible()) {
                startTimer()
            }
        }

        // 页面卸载时上报
        window.addEventListener('beforeunload', handleBeforeUnload)

        // 兼容性：监听 pagehide 事件（iOS Safari 更可靠）
        window.addEventListener('pagehide', handlePageHide)
    })()

    /**
     * 点击飞象老师 Logo 的埋点
     */
    function trackLogoClick(event) {
        // 阻止事件冒泡，避免触发 HTML 点击埋点
        event.stopPropagation()

        if (window.frog) {
            const serverData = window.__SERVER_DATA__ || {}
            const chatId = serverData.watermarkChatId
            console.log('trackHtmlClick', chatId)

            window.frog.add({
                url: '/click/HtmlPage/logo',
                eventId: 42816,
                customExtend: {
                    chat_id: chatId,
                },
                currentPage: 'HtmlPage',
                eventAction: 'click',
                eventName: 'logo'
            })

            console.log('[埋点] 点击飞象老师 Logo')
        }
    }

    /**
     * 点击立即体验的埋点
     */
    function trackStartButtonClick(event) {
        // 阻止事件冒泡，避免触发 HTML 点击埋点
        event.stopPropagation()

        if (window.frog) {
            const serverData = window.__SERVER_DATA__ || {}
            const chatId = serverData.watermarkChatId
            console.log('trackHtmlClick', chatId)
            window.frog.add({
                url: '/click/HtmlPage/start',
                eventId: 42817,
                customExtend: {
                    chat_id: chatId
                },
                currentPage: 'HtmlPage',
                eventAction: 'click',
                eventName: 'start'
            })
            console.log('[埋点] 点击立即体验')
        }
    }

    // 绑定点击事件
    document.addEventListener('DOMContentLoaded', function () {
        // 绑定 Logo 点击埋点和跳转功能
        const logoElement = document.querySelector('.left-watermark-content')
        if (logoElement) {
            logoElement.addEventListener('click', function (event) {
                trackLogoClick(event)
                openFeixiangTeacher(event)
            })
        }

        // 绑定立即体验按钮点击埋点和跳转功能
        const startButton = document.querySelector('.jump-button')
        if (startButton) {
            startButton.addEventListener('click', function (event) {
                trackStartButtonClick(event)
                openFeixiangTeacher(event)
            })
        }

        // 绑定水印覆盖层点击（整体区域）
        const watermarkOverlay = document.querySelector('.watermark-overlay')
        if (watermarkOverlay) {
            watermarkOverlay.addEventListener('click', function (event) {
                // 如果点击的不是 logo 或按钮，则触发跳转
                const target = event.target
                const isLogo = target.closest('.left-watermark-content')
                const isButton = target.closest('.jump-button')

                if (!isLogo && !isButton) {
                    openFeixiangTeacher(event)
                }
            })
        }
    })

    // ==================== 原有功能代码 ====================

    function adjustRem() {
        const pcBaseWidth = 375 // 设计稿
        const width = document.documentElement.clientWidth
        document.documentElement.style.fontSize = `${(width / pcBaseWidth * 100).toFixed(2)}px`
    }


    // 移动端检测和按钮隐藏逻辑
    function checkAndHideButtonOnMobile() {
        const isMobile = getIsMobile()
        if (isMobile) {
            adjustRem()
        }
        const jumpButton = document.querySelector('.right-watermark-content .jump-button');
        const iframeContainer = document.querySelector('.iframe-container');

        if (isMobile && jumpButton) {
            jumpButton.style.display = 'none';
        } else {
            jumpButton.style.display = 'flex'
        }

        // 移动端时给iframe-container添加类名，否则移除类名
        if (iframeContainer) {
            if (isMobile) {
                iframeContainer.classList.add('mobile');
            } else {
                iframeContainer.classList.remove('mobile');
            }
        }
    }


    function handleResize() {
        // 响应式处理：重新检测移动端并处理按钮显示/隐藏
        checkAndHideButtonOnMobile();

        // 在窗口大小变化时，重新应用移动端相关的逻辑
        const isMobile = getIsMobile()
        const watermarkOverlay = document.querySelector('.watermark-overlay');
        const iframeContainer = document.querySelector('.iframe-container');

        // 根据当前设备类型调整水印覆盖层的点击行为
        if (watermarkOverlay) {
            if (isMobile) {
                // 移动端：移除点击事件或设置为空函数
                watermarkOverlay.onclick = function () {
                    // 移动端不执行跳转
                    return;
                };
            } else {
                // 桌面端：恢复正常的点击跳转功能
                watermarkOverlay.onclick = openFeixiangTeacher;
            }
        }

        // 确保在resize时也能正确添加或移除mobile类
        if (iframeContainer) {
            if (isMobile) {
                iframeContainer.classList.add('mobile');
            } else {
                iframeContainer.classList.remove('mobile');
            }
        }
    }

    // 防止iframe内容溢出
    window.addEventListener('resize', handleResize);

    // 页面加载完成后执行移动端检测
    document.addEventListener('DOMContentLoaded', checkAndHideButtonOnMobile);

    // 清理所有事件绑定的函数
    function clearAllEvents() {
        // 清除 resize 事件监听器
        window.removeEventListener('resize', handleResize);

        // 清除 DOMContentLoaded 事件监听器
        document.removeEventListener('DOMContentLoaded', checkAndHideButtonOnMobile);
    }

    // 页面卸载时自动清理事件（可选）
    window.addEventListener('beforeunload', clearAllEvents);
