<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>课件标题</title>
  <!-- spec: requirements=; require=; count=页数 -->
  <!-- fx-style: palette=FX-青(B-08); radius=0; keyword=; source=hash -->
</head>
<body>

<div id="cw-loading">加载课件中...</div>

<!-- ============ 飞象风 page-shared：令牌 + 组件（替换令牌值即换色板） ============ -->
<template class="page-shared">
  <style>
    :root{
      /* 选定飞象色板（示例：FX-青 / B-08）。换色板时整组替换，见 feixiang-style.md §2 */
      --bg:#FFFFFF; --text:#00404D; --primary:#00404D; --accent:#137F8B;
      --card:#D3F6F4; --card-border:rgba(0,64,77,.30);
      --demo-bg:#D3F6F4; --demo-border:#93BFC2; --demo-grid:#DBF1F0;
      --btn-primary-bg:#00404D; --btn-primary-fg:#FFFFFF;
      --btn-2nd-bg:#ECFCFB; --btn-2nd-fg:#00404D;
      --ok:#1F9D57; --no:#D14343;
      --radius:0px;
      --font:"PingFang SC","Microsoft YaHei",system-ui,sans-serif;
    }
    /* 画布 */
    .slide{ width:100%; min-height:540px; box-sizing:border-box;
      font-family:var(--font); color:var(--text); background:var(--bg); }
    .slide--fit{ height:540px; overflow:hidden; }
    .slide--scroll{ max-height:540px; overflow-x:hidden; overflow-y:auto; -webkit-overflow-scrolling:touch; }

    /* 飞象组件：平涂 + 描边 + 无阴影 */
    .fx-card{ background:var(--card); border:2px solid var(--card-border);
      border-radius:var(--radius); padding:14px 16px; }
    .fx-demo{ background:var(--demo-bg); border:2px solid var(--demo-border);
      border-radius:var(--radius);
      background-image:
        linear-gradient(var(--demo-grid) 1px, transparent 1px),
        linear-gradient(90deg, var(--demo-grid) 1px, transparent 1px);
      background-size:30px 30px; }
    .fx-btn{ font-size:15px; font-weight:600; padding:9px 20px; cursor:pointer;
      border-radius:var(--radius); background:var(--btn-primary-bg);
      color:var(--btn-primary-fg); border:2px solid var(--card-border); }
    .fx-btn--2nd{ background:var(--btn-2nd-bg); color:var(--btn-2nd-fg); }
    .fx-chip{ display:inline-block; padding:4px 12px; border:2px solid var(--card-border);
      border-radius:999px; background:var(--card); font-size:13px; font-weight:600; }
    .fx-block{ border-radius:calc(var(--radius) / 2); border:3px solid; }
    .fx-head{ display:flex; align-items:baseline; gap:12px; }
    .fx-head h2{ margin:0; color:var(--primary); font-size:26px; font-weight:700; }
    .fx-head .fx-sub{ font-size:13px; color:var(--text); opacity:.65; }

    /* 版式框：固定画布 + 四周内容（页眉课题/页码、页脚品牌/进度、四角装饰） */
    .fx-page{ position:relative; height:540px; box-sizing:border-box;
      display:flex; flex-direction:column; background:var(--bg); overflow:hidden; }
    .fx-page--scroll .fx-body{ overflow-y:auto; -webkit-overflow-scrolling:touch; }
    .fx-topbar{ display:flex; align-items:center; justify-content:space-between;
      padding:12px 30px; border-bottom:2px solid var(--card-border); flex-shrink:0; }
    .fx-pageno{ font-size:13px; font-weight:700; color:var(--primary); letter-spacing:1px; }
    .fx-body{ flex:1; min-height:0; padding:16px 30px; }
    .fx-footer{ display:flex; align-items:center; justify-content:space-between;
      padding:8px 30px; border-top:2px solid var(--card-border); flex-shrink:0;
      font-size:12px; color:var(--text); opacity:.7; }
    .fx-brand{ letter-spacing:1px; }
    .fx-dots{ display:inline-flex; gap:6px; }
    .fx-dot{ width:8px; height:8px; border:2px solid var(--card-border); background:transparent; }
    .fx-dot--on{ background:var(--primary); border-color:var(--primary); }
    .fx-corner{ position:absolute; width:16px; height:16px; pointer-events:none; }
    .fx-corner--tl{ left:10px; top:10px; border-left:3px solid var(--accent); border-top:3px solid var(--accent); }
    .fx-corner--tr{ right:10px; top:10px; border-right:3px solid var(--accent); border-top:3px solid var(--accent); }
    .fx-corner--bl{ left:10px; bottom:10px; border-left:3px solid var(--accent); border-bottom:3px solid var(--accent); }
    .fx-corner--br{ right:10px; bottom:10px; border-right:3px solid var(--accent); border-bottom:3px solid var(--accent); }
  </style>
</template>

<!-- ============ 第 1 页：封面（纯色平涂 + 版式框；无渐变主背景、无 emoji） ============ -->
<template class="page-data" data-id="1" data-name="封面">
  <style>
    .cover-body{ display:flex; flex-direction:column; justify-content:center; align-items:flex-start;
      height:100%; padding:0 30px; }
    .cover-body h1{ font-size:40px; font-weight:800; margin:16px 0 12px; color:var(--primary); }
    .cover-body .sub{ font-size:18px; line-height:1.7; color:var(--text); }
    .cover-body .bar{ width:64px; height:8px; background:var(--accent); margin-top:20px;
      border:2px solid var(--card-border); }
  </style>
  <div class="slide slide--fit fx-page">
    <header class="fx-topbar">
      <span class="fx-chip">学科 · 年级</span>
      <span class="fx-pageno" data-fx-pageno></span>
    </header>
    <div class="fx-body cover-body">
      <h1>课件标题</h1>
      <p class="sub">副标题：本课要点 / 课时</p>
      <div class="bar"></div>
    </div>
    <footer class="fx-footer">
      <span class="fx-brand">飞象课堂 · 学科名</span>
      <span class="fx-dots" data-fx-progress></span>
    </footer>
    <span class="fx-corner fx-corner--tl"></span>
    <span class="fx-corner fx-corner--tr"></span>
    <span class="fx-corner fx-corner--bl"></span>
    <span class="fx-corner fx-corner--br"></span>
  </div>
</template>

<!-- ============ 第 2 页：概念（卡片网格 + 多色高亮块） ============ -->
<template class="page-data" data-id="2" data-name="概念讲解">
  <style>
    .grid{ display:grid; grid-template-columns:1fr 1fr; gap:12px; }
    .concept h3{ margin:0 0 6px; font-size:18px; color:var(--primary); }
    .concept p{ margin:0; font-size:15px; line-height:1.6; }
  </style>
  <div class="slide slide--fit fx-page fx-page--scroll concept">
    <header class="fx-topbar">
      <span class="fx-chip" data-fx-pagename></span>
      <span class="fx-pageno" data-fx-pageno></span>
    </header>
    <div class="fx-body">
      <div class="fx-head"><h2>核心概念</h2><span class="fx-sub">2–4 个要点</span></div>
      <div class="grid" style="margin-top:12px;">
        <div class="fx-card"><h3>要点一</h3><p>说明文字，≤80 字。</p></div>
        <div class="fx-card"><h3>要点二</h3><p>说明文字，≤80 字。</p></div>
        <div class="fx-card" style="grid-column:1/-1; display:flex; gap:12px; align-items:center;">
          <span class="fx-block" style="background:var(--accent); border-color:var(--primary); width:40px; height:40px;"></span>
          <p style="margin:0;">用多色几何块 <code>.fx-block</code> 高亮关键对象，形成视觉分块。</p>
        </div>
      </div>
    </div>
    <footer class="fx-footer">
      <span class="fx-brand">飞象课堂 · 学科名</span>
      <span class="fx-dots" data-fx-progress></span>
    </footer>
    <span class="fx-corner fx-corner--tl"></span><span class="fx-corner fx-corner--tr"></span>
    <span class="fx-corner fx-corner--bl"></span><span class="fx-corner fx-corner--br"></span>
  </div>
</template>

<!-- ============ 第 3 页：互动（.fx-demo 网格 Stage + 控件条） ============ -->
<template class="page-data" data-id="3" data-name="互动演示">
  <style>
    .lab-body{ display:flex; flex-direction:column; height:100%; }
    .lab-body .stage{ flex:1; display:flex; align-items:center; justify-content:center; }
    .lab-body .ctrl{ padding-top:12px; display:flex; align-items:center; gap:12px; }
    .lab-body .val{ font-size:18px; font-weight:700; color:var(--primary); }
  </style>
  <div class="slide slide--fit fx-page">
    <header class="fx-topbar">
      <span class="fx-chip" data-fx-pagename></span>
      <span class="fx-pageno" data-fx-pageno></span>
    </header>
    <div class="fx-body lab-body">
      <div class="fx-head"><h2>互动演示</h2><span class="fx-sub">操作后状态实时变化</span></div>
      <div class="stage fx-demo" data-interactive style="margin-top:12px;">
        <span class="val" id="out">状态：0</span>
      </div>
      <div class="ctrl">
        <input type="range" id="rng" data-interactive min="0" max="100" value="0" style="flex:1; accent-color:var(--primary);">
        <button type="button" class="fx-btn" id="reset" data-interactive>重置</button>
      </div>
    </div>
    <footer class="fx-footer">
      <span class="fx-brand">飞象课堂 · 学科名</span>
      <span class="fx-dots" data-fx-progress></span>
    </footer>
    <span class="fx-corner fx-corner--tl"></span><span class="fx-corner fx-corner--tr"></span>
    <span class="fx-corner fx-corner--bl"></span><span class="fx-corner fx-corner--br"></span>
  </div>
  <script>
    (function(){
      var rng=document.getElementById('rng'), out=document.getElementById('out');
      function update(v,skip){ out.textContent='状态：'+v; rng.value=v;
        if(!skip) window.parent.postMessage({type:'saveState',state:{v:Number(v)}},'*'); }
      rng.addEventListener('input',function(){ update(rng.value); });
      document.getElementById('reset').addEventListener('click',function(){ update(0); });
      window.addEventListener('message',function(e){
        if(e.data&&e.data.type==='restoreState'&&e.data.state) update(e.data.state.v,true); });
      update(0,true);
    })();
  </script>
</template>

<!-- ============ 第 4 页：测验（选项=次要按钮；对错用色板绿/红） ============ -->
<template class="page-data" data-id="4" data-name="课堂测验">
  <style>
    .quiz .q{ font-size:16px; font-weight:700; margin:14px 0 6px; }
    .opt{ display:block; width:100%; text-align:left; margin:5px 0;
      font-size:15px; padding:9px 14px; cursor:pointer; }
    .opt.correct{ border-color:var(--ok); color:var(--ok); }
    .opt.wrong{ border-color:var(--no); color:var(--no); }
    .foot{ display:flex; align-items:center; gap:12px; margin-top:14px; }
    #score{ flex:1; font-weight:700; color:var(--primary); }
  </style>
  <div class="slide slide--fit fx-page fx-page--scroll quiz">
    <header class="fx-topbar">
      <span class="fx-chip" data-fx-pagename></span>
      <span class="fx-pageno" data-fx-pageno></span>
    </header>
    <div class="fx-body">
      <div class="fx-head"><h2>课堂测验</h2><span class="fx-sub">选后提交</span></div>
      <p class="q">1. 示例题干？</p>
      <button type="button" class="fx-btn fx-btn--2nd opt" data-interactive data-q="0" data-v="A">选项 A</button>
      <button type="button" class="fx-btn fx-btn--2nd opt" data-interactive data-q="0" data-v="B">选项 B</button>
      <div class="foot">
        <span id="score">请作答</span>
        <button type="button" class="fx-btn" id="submit" data-interactive>提交</button>
      </div>
    </div>
    <footer class="fx-footer">
      <span class="fx-brand">飞象课堂 · 学科名</span>
      <span class="fx-dots" data-fx-progress></span>
    </footer>
    <span class="fx-corner fx-corner--tl"></span><span class="fx-corner fx-corner--tr"></span>
    <span class="fx-corner fx-corner--bl"></span><span class="fx-corner fx-corner--br"></span>
  </div>
  <script>
    (function(){
      var ANS={0:'A'}, pick={0:null}, done=false, s=document.getElementById('score');
      function save(){ window.parent.postMessage({type:'saveState',state:{pick:pick,done:done}},'*'); }
      document.querySelectorAll('.opt').forEach(function(b){
        b.addEventListener('click',function(){ if(done) return;
          pick[b.dataset.q]=b.dataset.v;
          document.querySelectorAll('.opt[data-q="'+b.dataset.q+'"]').forEach(function(x){ x.style.borderColor=''; });
          b.style.borderColor='var(--primary)'; save(); });
      });
      function grade(){ if(!pick[0]){ s.textContent='请先作答'; return; } done=true;
        document.querySelectorAll('.opt').forEach(function(b){ b.disabled=true;
          if(b.dataset.v===ANS[b.dataset.q]) b.classList.add('correct');
          else if(b.dataset.v===pick[b.dataset.q]) b.classList.add('wrong'); });
        s.textContent = pick[0]===ANS[0] ? '正确' : '再想想'; save(); }
      document.getElementById('submit').addEventListener('click',grade);
      window.addEventListener('message',function(e){
        if(e.data&&e.data.type==='restoreState'&&e.data.state){ var st=e.data.state;
          pick=st.pick||pick; done=!!st.done; if(done) grade(); } });
    })();
  </script>
</template>

<script src="./courseware-shell.js"></script>
</body>
</html>
