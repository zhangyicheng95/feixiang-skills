<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <meta name="cw-mastery-score" content="70">
  <title>课程游戏标题</title>
  <!-- spec: product=game; requirements=; require=; core-loop=; scorm=2004 -->
  <!-- fx-style: palette=FX-蓝(飞象默认); layout=game-960x540; keyword=; source=飞象产物对齐 -->
  <style>
    :root{
      --primary:#3B82F6; --secondary:#60A5FA; --accent:#F59E0B;
      --bg:#FFFFFF; --text:#1E293B; --success:#10B981; --error:#EF4444;
      --muted:#64748B;
      --font:"PingFang SC","Microsoft YaHei","Noto Sans SC",system-ui,sans-serif;
    }
    *{ box-sizing:border-box; }
    html,body{
      margin:0; width:100%; height:100%; overflow:hidden;
      font-family:var(--font); color:var(--text); background:#eef1f5;
      -webkit-text-size-adjust:100%; text-size-adjust:100%;
    }
    #game-root{
      width:960px; height:540px; max-width:100vw; max-height:100dvh;
      margin:0 auto; position:relative; background:var(--bg);
      display:flex; flex-direction:column; overflow:hidden;
    }
    .screen{ flex:1; display:none; flex-direction:column; padding:24px 32px; min-height:0; }
    .screen.active{ display:flex; }
    .game-title{ font-size:28px; font-weight:700; color:var(--primary); margin:0 0 12px; }
    .btn{
      min-height:44px; min-width:44px; padding:10px 20px; border:none; border-radius:10px;
      background:var(--primary); color:#fff; font-size:16px; font-weight:600; cursor:pointer;
      touch-action:manipulation;
    }
    .btn:disabled{ opacity:.5; cursor:not-allowed; }
    .btn-secondary{ background:var(--secondary); }
    .score-bar{ font-size:14px; color:var(--muted); margin-bottom:8px; }
    .feedback{ margin-top:12px; font-weight:600; min-height:24px; }
    .feedback.ok{ color:var(--success); }
    .feedback.err{ color:var(--error); }
    .choices{ display:flex; flex-direction:column; gap:10px; margin-top:16px; }
    .choice{
      min-height:44px; padding:12px 16px; border:2px solid #e2e8f0; border-radius:10px;
      background:#fff; text-align:left; cursor:pointer; touch-action:manipulation;
    }
    .choice.selected{ border-color:var(--primary); background:#eff6ff; }
  </style>
</head>
<body>
  <div id="game-root">
    <!-- 引导 -->
    <section class="screen active" data-phase="intro">
      <h1 class="game-title">游戏标题</h1>
      <p>玩法说明（1–2 句）</p>
      <button type="button" class="btn" id="btn-start">开始闯关</button>
    </section>
    <!-- 游戏主体 -->
    <section class="screen" data-phase="play">
      <div class="score-bar">第 <span id="level-num">1</span> 关 · 得分 <span id="score">0</span></div>
      <p id="question-text">题目占位</p>
      <div class="choices" id="choices"></div>
      <p class="feedback" id="feedback" aria-live="polite"></p>
      <button type="button" class="btn" id="btn-next" disabled>下一题</button>
    </section>
    <!-- 结算 -->
    <section class="screen" data-phase="result">
      <h1 class="game-title">闯关完成</h1>
      <p>最终得分：<strong id="final-score">0</strong></p>
      <button type="button" class="btn" id="btn-retry">再玩一次</button>
    </section>
  </div>

  <script>
  (function(){
    var state = {
      phase: 'intro',
      level: 1,
      qIndex: 0,
      score: 0,
      levels: [
        { questions: [{ text: '示例题？', choices: ['A','B','C'], answer: 0 }] }
      ]
    };

    function setPhase(phase){
      if (state.phase === phase) return;
      state.phase = phase;
      document.querySelectorAll('.screen').forEach(function(el){
        el.classList.toggle('active', el.getAttribute('data-phase') === phase);
      });
    }

    function reportScorm(){
      if (typeof window.__cwScormReport === 'function') {
        window.__cwScormReport({
          score: state.score,
          complete: true,
          interactions: []
        });
      }
    }

    document.getElementById('btn-start').addEventListener('click', function(){
      setPhase('play');
    });
    document.getElementById('btn-retry').addEventListener('click', function(){
      state.level = 1; state.qIndex = 0; state.score = 0;
      setPhase('intro');
    });
    document.getElementById('btn-next').addEventListener('click', function(){
      setPhase('result');
      reportScorm();
    });
  })();
  </script>
  <script src="./scorm-api.js"></script>
</body>
</html>
