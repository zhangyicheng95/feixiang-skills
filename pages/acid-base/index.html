<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>酸碱中和反应 · 初二化学</title>
  <!-- spec: requirements=初二化学,4页,1互动+测验; require=中和滴定模拟,pH变化,4题判分; core-loop=滴碱→pH升→中和提示;测验:选题→提交→反馈 -->
</head>
<body>

<div id="cw-loading">加载课件中...</div>

<template class="page-shared">
  <style>
    :root {
      --primary: #7c3aed;
      --secondary: #a78bfa;
      --accent: #f472b6;
      --bg: #faf5ff;
      --text: #1e1b4b;
      --muted: #64748b;
      --success: #16a34a;
      --error: #dc2626;
    }
    .slide {
      width: 100%;
      min-height: 540px;
      box-sizing: border-box;
      font-family: "PingFang SC", "Microsoft YaHei", system-ui, sans-serif;
      color: var(--text);
    }
    .slide--fit {
      height: 540px;
      overflow: hidden;
    }
    .slide--scroll {
      max-height: 540px;
      overflow-x: hidden;
      overflow-y: auto;
      -webkit-overflow-scrolling: touch;
    }
    .btn {
      padding: 8px 18px;
      border: none;
      border-radius: 8px;
      background: var(--primary);
      color: #fff;
      font-size: 15px;
      font-weight: 600;
      cursor: pointer;
    }
    .btn-outline {
      background: #fff;
      color: var(--primary);
      border: 2px solid var(--primary);
    }
  </style>
</template>

<!-- 第 1 页：封面 -->
<template class="page-data" data-id="1" data-name="封面">
  <style>
    .cover {
      height: 100%;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      text-align: center;
      padding: 40px;
      background: linear-gradient(155deg, #4c1d95 0%, #7c3aed 45%, #c4b5fd 100%);
      color: #fff;
    }
    .cover h1 { font-size: 40px; margin: 14px 0 10px; }
    .cover .sub { font-size: 19px; opacity: 0.92; line-height: 1.6; max-width: 480px; }
    .badge {
      display: inline-block;
      padding: 6px 14px;
      border-radius: 999px;
      background: rgba(255,255,255,.2);
      font-size: 14px;
    }
  </style>
  <div class="slide slide--fit cover">
    <span class="badge">初二化学 · 溶液的酸碱性</span>
    <h1>酸碱中和反应</h1>
    <p class="sub">酸 + 碱 → 盐 + 水<br>互动模拟滴定 · 课堂小测</p>
  </div>
</template>

<!-- 第 2 页：概念 -->
<template class="page-data" data-id="2" data-name="概念讲解">
  <style>
    .concept { padding: 26px 34px; background: var(--bg); }
    .concept h2 { color: var(--primary); font-size: 26px; margin: 0 0 14px; }
    .grid { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; }
    .card {
      background: #fff;
      border-radius: 12px;
      padding: 14px 16px;
      border-left: 4px solid var(--primary);
      box-shadow: 0 2px 8px rgba(124,58,237,.08);
    }
    .card h3 { margin: 0 0 6px; font-size: 16px; color: var(--primary); }
    .card p, .card li { margin: 0; font-size: 14px; line-height: 1.6; }
    .card ul { padding-left: 18px; margin-top: 6px; }
    .formula {
      grid-column: 1 / -1;
      text-align: center;
      padding: 14px;
      background: #fff;
      border: 2px solid #ddd6fe;
      border-radius: 12px;
      font-size: 20px;
      font-weight: 700;
      color: var(--primary);
    }
    .example {
      grid-column: 1 / -1;
      background: #f5f3ff;
      border-radius: 10px;
      padding: 12px 16px;
      font-size: 15px;
    }
  </style>
  <div class="slide slide--scroll concept">
    <h2>什么是中和反应？</h2>
    <div class="grid">
      <div class="card">
        <h3>定义</h3>
        <p>酸和碱作用生成<strong>盐</strong>和<strong>水</strong>的反应，叫做中和反应。</p>
      </div>
      <div class="card">
        <h3>实质</h3>
        <p>在水溶液中，酸提供的 H⁺ 与碱提供的 OH⁻ 结合生成 H₂O。</p>
      </div>
      <div class="formula">酸 + 碱 → 盐 + 水</div>
      <div class="example">
        <strong>实例：</strong>HCl + NaOH → NaCl + H₂O<br>
        （盐酸与氢氧化钠反应生成氯化钠和水）
      </div>
      <div class="card">
        <h3>指示剂</h3>
        <ul>
          <li>酚酞：酸性/中性无色，碱性<strong>变红</strong></li>
          <li>石蕊：酸性变红，碱性变蓝</li>
        </ul>
      </div>
      <div class="card">
        <h3>pH 与中性</h3>
        <ul>
          <li>pH &lt; 7 酸性；pH = 7 中性；pH &gt; 7 碱性</li>
          <li>中和完全时，溶液接近 pH = 7</li>
        </ul>
      </div>
    </div>
  </div>
</template>

<!-- 第 3 页：互动 - 滴定模拟 -->
<template class="page-data" data-id="3" data-name="中和滴定模拟">
  <style>
    .lab {
      height: 540px;
      display: flex;
      flex-direction: column;
      background: linear-gradient(180deg, #1e1b4b 0%, #312e81 100%);
      color: #e2e8f0;
    }
    .lab-head { padding: 14px 28px 6px; }
    .lab-head h2 { margin: 0; font-size: 22px; color: #c4b5fd; }
    .lab-head p { margin: 4px 0 0; font-size: 13px; color: #94a3b8; }
    .lab-main {
      flex: 1;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 40px;
      padding: 0 32px;
    }
    .beaker-wrap { text-align: center; }
    .beaker {
      width: 140px;
      height: 200px;
      border: 4px solid rgba(255,255,255,.35);
      border-top: none;
      border-radius: 0 0 16px 16px;
      margin: 0 auto;
      position: relative;
      overflow: hidden;
      background: rgba(255,255,255,.06);
    }
    .liquid {
      position: absolute;
      bottom: 0;
      left: 0;
      right: 0;
      height: 75%;
      background: #fef08a;
      transition: background 0.35s ease, height 0.2s ease;
    }
    .beaker-label { margin-top: 10px; font-size: 14px; color: #cbd5e1; }
    .panel {
      width: 380px;
      background: rgba(255,255,255,.08);
      border-radius: 16px;
      padding: 20px 22px;
    }
    .ph-meter {
      font-size: 48px;
      font-weight: 800;
      color: #fde047;
      text-align: center;
      margin-bottom: 8px;
    }
    .ph-bar {
      height: 12px;
      border-radius: 999px;
      background: linear-gradient(90deg, #ef4444, #eab308, #22c55e, #3b82f6);
      margin-bottom: 16px;
      position: relative;
    }
    .ph-marker {
      position: absolute;
      top: -4px;
      width: 4px;
      height: 20px;
      background: #fff;
      border-radius: 2px;
      transition: left 0.25s ease;
    }
    .status {
      text-align: center;
      min-height: 28px;
      font-size: 16px;
      font-weight: 600;
      margin-bottom: 14px;
      color: #a5f3fc;
    }
    .lab-panel {
      padding: 12px 28px 18px;
      background: #1e293b;
      display: flex;
      align-items: center;
      gap: 14px;
    }
    .lab-panel input[type=range] { flex: 1; accent-color: #a78bfa; }
    .lab-panel label { font-size: 14px; white-space: nowrap; }
  </style>
  <div class="slide slide--fit lab">
    <div class="lab-head">
      <h2>互动：盐酸中滴加 NaOH</h2>
      <p>拖动滑块模拟滴加碱液，观察 pH 与酚酞颜色变化（定性模型）</p>
    </div>
    <div class="lab-main">
      <div class="beaker-wrap">
        <div class="beaker" data-interactive>
          <div class="liquid" id="liquid"></div>
        </div>
        <p class="beaker-label">锥形瓶 · 含酚酞指示剂</p>
      </div>
      <div class="panel">
        <div class="ph-meter" id="phValue">pH 1.5</div>
        <div class="ph-bar"><div class="ph-marker" id="phMarker"></div></div>
        <p class="status" id="statusText">溶液呈酸性（盐酸过量）</p>
        <p style="font-size:13px;color:#94a3b8;text-align:center;margin:0">
          已滴加 NaOH：<strong id="dropPct" style="color:#fde68a">0</strong>%
        </p>
      </div>
    </div>
    <div class="lab-panel">
      <label for="naohSlider">滴加 NaOH</label>
      <input type="range" id="naohSlider" data-interactive min="0" max="100" value="0" step="1">
      <button type="button" class="btn" id="resetLab" data-interactive>重置</button>
    </div>
  </div>
  <script>
    (function () {
      var slider = document.getElementById('naohSlider');
      var liquid = document.getElementById('liquid');
      var phValue = document.getElementById('phValue');
      var phMarker = document.getElementById('phMarker');
      var statusText = document.getElementById('statusText');
      var dropPct = document.getElementById('dropPct');
      var neutralPoint = 62;

      function phFromDrops(v) {
        if (v <= 0) return 1.5;
        if (v >= 100) return 13.5;
        if (v < neutralPoint) {
          return 1.5 + (6.5 - 1.5) * (v / neutralPoint);
        }
        return 6.5 + (13.5 - 6.5) * ((v - neutralPoint) / (100 - neutralPoint));
      }

      function liquidColor(ph) {
        if (ph < 6.5) return '#fef08a';
        if (ph < 8.2) return '#fbcfe8';
        return '#f472b6';
      }

      function statusMsg(ph, v) {
        if (v === 0) return '溶液呈强酸性（盐酸）';
        if (ph >= 6.8 && ph <= 7.2) return '🎉 中和完成！pH ≈ 7（中性）';
        if (ph < 7) return '仍呈酸性，继续滴加 NaOH…';
        return '碱过量，酚酞呈碱性红色';
      }

      function update(v, skipSave) {
        var ph = phFromDrops(v);
        phValue.textContent = 'pH ' + ph.toFixed(1);
        phMarker.style.left = Math.max(0, Math.min(100, ((ph - 1) / 13) * 100)) + '%';
        liquid.style.background = liquidColor(ph);
        liquid.style.height = (72 + v * 0.06) + '%';
        statusText.textContent = statusMsg(ph, v);
        dropPct.textContent = String(v);
        slider.value = String(v);
        if (!skipSave) {
          window.parent.postMessage({ type: 'saveState', state: { drops: v } }, '*');
        }
      }

      slider.addEventListener('input', function () {
        update(Number(slider.value));
      });

      document.getElementById('resetLab').addEventListener('click', function () {
        update(0);
      });

      window.addEventListener('message', function (e) {
        if (e.data && e.data.type === 'restoreState' && e.data.state && e.data.state.drops != null) {
          update(e.data.state.drops, true);
        }
      });

      update(0, true);
    })();
  </script>
</template>

<!-- 第 4 页：测验 -->
<template class="page-data" data-id="4" data-name="课堂测验">
  <style>
    .quiz { padding: 20px 30px 24px; background: var(--bg); }
    .quiz h2 { margin: 0 0 6px; font-size: 24px; color: var(--primary); }
    .hint { margin: 0 0 12px; font-size: 14px; color: var(--muted); }
    .q-text { font-size: 16px; font-weight: 600; margin: 0 0 6px; }
    .q-block { margin-bottom: 10px; }
    .opt {
      display: block; width: 100%; text-align: left;
      padding: 8px 12px; margin: 4px 0;
      border: 2px solid #e9d5ff; border-radius: 8px;
      background: #fff; font-size: 15px; cursor: pointer;
    }
    .opt:disabled { cursor: default; }
    .opt.correct { border-color: var(--success); background: #dcfce7; }
    .opt.wrong { border-color: var(--error); background: #fee2e2; }
    .footer {
      display: flex; align-items: center; gap: 12px;
      margin-top: 12px; padding-top: 12px; border-top: 1px solid #ddd6fe;
    }
    #scoreText { flex: 1; font-size: 16px; font-weight: 700; color: var(--primary); }
  </style>
  <div class="slide slide--scroll quiz">
    <h2>课堂测验</h2>
    <p class="hint">共 4 题，选完后点击「提交答案」</p>

    <div class="q-block">
      <p class="q-text">1. 中和反应的生成物是？</p>
      <button type="button" class="opt" data-interactive data-q="0" data-v="A">盐和氧气</button>
      <button type="button" class="opt" data-interactive data-q="0" data-v="B">盐和水</button>
      <button type="button" class="opt" data-interactive data-q="0" data-v="C">酸和碱</button>
    </div>
    <div class="q-block">
      <p class="q-text">2. 酚酞在碱性溶液中显？</p>
      <button type="button" class="opt" data-interactive data-q="1" data-v="A">无色</button>
      <button type="button" class="opt" data-interactive data-q="1" data-v="B">红色</button>
      <button type="button" class="opt" data-interactive data-q="1" data-v="C">蓝色</button>
    </div>
    <div class="q-block">
      <p class="q-text">3. HCl + NaOH 反应的产物是？</p>
      <button type="button" class="opt" data-interactive data-q="2" data-v="A">NaCl 和 H₂O</button>
      <button type="button" class="opt" data-interactive data-q="2" data-v="B">NaOH 和 Cl₂</button>
      <button type="button" class="opt" data-interactive data-q="2" data-v="C">H₂ 和 NaClO</button>
    </div>
    <div class="q-block">
      <p class="q-text">4. 互动模拟中，中和完成时 pH 约为？</p>
      <button type="button" class="opt" data-interactive data-q="3" data-v="A">1</button>
      <button type="button" class="opt" data-interactive data-q="3" data-v="B">7</button>
      <button type="button" class="opt" data-interactive data-q="3" data-v="C">14</button>
    </div>

    <div class="footer">
      <span id="scoreText">请选择答案后提交</span>
      <button type="button" class="btn" id="submitQuiz" data-interactive>提交答案</button>
      <button type="button" class="btn btn-outline" id="retryQuiz" data-interactive>重新作答</button>
    </div>
  </div>
  <script>
    (function () {
      var ANSWERS = { 0: 'B', 1: 'B', 2: 'A', 3: 'B' };
      var picks = { 0: null, 1: null, 2: null, 3: null };
      var submitted = false;
      var scoreEl = document.getElementById('scoreText');

      function save() {
        window.parent.postMessage({
          type: 'saveState',
          state: { picks: picks, submitted: submitted }
        }, '*');
      }

      function select(q, val, btn) {
        if (submitted) return;
        picks[q] = val;
        document.querySelectorAll('.opt[data-q="' + q + '"]').forEach(function (b) {
          b.style.borderColor = '';
          b.style.background = '';
        });
        btn.style.borderColor = 'var(--primary)';
        btn.style.background = '#ede9fe';
        save();
      }

      document.querySelectorAll('.opt').forEach(function (btn) {
        btn.addEventListener('click', function () {
          select(Number(btn.dataset.q), btn.dataset.v, btn);
        });
      });

      function grade() {
        var missing = [0, 1, 2, 3].filter(function (q) { return !picks[q]; });
        if (missing.length) {
          scoreEl.textContent = '还有 ' + missing.length + ' 题未选择';
          scoreEl.style.color = 'var(--error)';
          return;
        }
        submitted = true;
        var score = 0;
        [0, 1, 2, 3].forEach(function (q) {
          if (picks[q] === ANSWERS[q]) score++;
          document.querySelectorAll('.opt[data-q="' + q + '"]').forEach(function (b) {
            b.disabled = true;
            if (b.dataset.v === ANSWERS[q]) b.classList.add('correct');
            else if (b.dataset.v === picks[q]) b.classList.add('wrong');
          });
        });
        scoreEl.textContent = '得分：' + score + ' / 4' + (score === 4 ? '  🎉 全对！' : '');
        scoreEl.style.color = score === 4 ? 'var(--success)' : 'var(--primary)';
        save();
      }

      document.getElementById('submitQuiz').addEventListener('click', grade);
      document.getElementById('retryQuiz').addEventListener('click', function () {
        submitted = false;
        picks = { 0: null, 1: null, 2: null, 3: null };
        document.querySelectorAll('.opt').forEach(function (b) {
          b.disabled = false;
          b.classList.remove('correct', 'wrong');
          b.style.borderColor = '';
          b.style.background = '';
        });
        scoreEl.textContent = '请选择答案后提交';
        scoreEl.style.color = '';
        save();
      });

      window.addEventListener('message', function (e) {
        if (!e.data || e.data.type !== 'restoreState' || !e.data.state) return;
        var st = e.data.state;
        picks = st.picks || picks;
        submitted = !!st.submitted;
        if (!submitted) {
          Object.keys(picks).forEach(function (q) {
            if (picks[q]) {
              var btn = document.querySelector('.opt[data-q="' + q + '"][data-v="' + picks[q] + '"]');
              if (btn) select(Number(q), picks[q], btn);
            }
          });
        } else {
          grade();
        }
      });
    })();
  </script>
</template>

<script src="./courseware-shell.js"></script>
</body>
</html>
